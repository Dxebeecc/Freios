<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup LATAM - Freios</title>
    <!-- Tailwind CSS para o visual -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js para a lógica do App (funciona igual React, mas direto no HTML) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased" x-data="appData()">

    <!-- TELA INICIAL (HOME) -->
    <div x-show="screen === 'home'" x-cloak class="min-h-screen flex flex-col items-center">
        <div class="w-full max-w-md bg-white min-h-screen shadow-xl flex flex-col">
            <!-- Header -->
            <div class="bg-red-600 p-8 text-white text-center rounded-b-[2.5rem] shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-3 opacity-90"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l5 5-3 3-3-1-1 1 2.5 4.5L11 23l1-1-1-3 3-3 5 5 1.2-.7c.4-.2.7-.6.6-1.1z"/></svg>
                <h1 class="text-3xl font-extrabold tracking-tight">Setup LATAM</h1>
                <p class="text-red-100 mt-1 font-medium">Guia Operacional de Freios</p>
            </div>

            <div class="flex-1 p-6 flex flex-col justify-center space-y-8">
                <!-- Seleção de Modelo -->
                <div>
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 ml-1">1. Qual o equipamento?</h2>
                    <div class="grid grid-cols-3 gap-3">
                        <template x-for="m in ['A320', 'A320 NEO', 'A321']">
                            <button @click="model = m" 
                                :class="model === m ? 'bg-blue-900 text-white shadow-[0_8px_16px_rgba(30,58,138,0.3)] scale-105' : 'bg-slate-50 text-slate-600 border border-slate-200 hover:bg-slate-100'"
                                class="py-4 px-2 rounded-2xl text-sm font-bold transition-all duration-200" x-text="m"></button>
                        </template>
                    </div>
                </div>

                <!-- Seleção de Ciclo -->
                <div>
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 ml-1">2. Qual o ciclo?</h2>
                    <div class="grid grid-cols-4 gap-3">
                        <template x-for="c in [1, 2, 3, 4]">
                            <button @click="cycle = c"
                                :class="cycle === c ? 'bg-red-600 text-white shadow-[0_8px_16px_rgba(220,38,38,0.3)] scale-105' : 'bg-slate-50 text-slate-600 border border-slate-200 hover:bg-slate-100'"
                                class="py-4 px-2 rounded-2xl text-sm font-bold transition-all duration-200 flex flex-col items-center justify-center gap-1">
                                <span class="text-lg" x-text="c + 'º'"></span>
                                <span x-show="c === 4" class="text-[9px] uppercase tracking-wider opacity-90">Overhaul</span>
                                <span x-show="c !== 4" class="text-[9px] uppercase tracking-wider opacity-70">Reparo</span>
                            </button>
                        </template>
                    </div>
                </div>

                <!-- Iniciar -->
                <button @click="startApp()" :disabled="!model || !cycle"
                    :class="(model && cycle) ? 'bg-emerald-500 hover:bg-emerald-600 text-white shadow-[0_8px_20px_rgba(16,185,129,0.3)] active:scale-95' : 'bg-slate-100 text-slate-300 cursor-not-allowed'"
                    class="w-full py-4 mt-8 rounded-2xl font-bold text-lg flex items-center justify-center gap-2 transition-all duration-300">
                    Iniciar Bancada 
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- TELA DO CHECKLIST -->
    <div x-show="screen === 'checklist'" x-cloak class="min-h-screen flex flex-col w-full max-w-md mx-auto bg-slate-50">
        <!-- Header Fixo -->
        <div class="bg-blue-900 text-white p-4 pt-6 shadow-md sticky top-0 z-20">
            <div class="flex items-center justify-between mb-6">
                <button @click="screen = 'home'" class="p-2 bg-blue-800 rounded-full hover:bg-blue-700 transition active:scale-90">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                </button>
                <div class="text-center">
                    <h1 class="font-black text-xl tracking-wide" x-text="model"></h1>
                    <p class="text-blue-200 text-xs uppercase tracking-widest font-semibold mt-1">
                        <span x-text="cycle + 'º Ciclo '"></span><span x-text="cycle === 4 ? '(Overhaul)' : '(Reparo)'"></span>
                    </p>
                </div>
                <div class="w-9"></div>
            </div>

            <!-- Progress Bar -->
            <div class="flex justify-between relative px-4">
                <div class="absolute top-1/2 left-8 right-8 h-1 bg-blue-800 -z-10 -translate-y-1/2 rounded-full"></div>
                <template x-for="(name, index) in stepNames">
                    <div class="flex flex-col items-center gap-1 bg-blue-900 px-2">
                        <div :class="step === index ? 'border-white bg-red-600 text-white shadow-[0_0_15px_rgba(220,38,38,0.5)]' : (step > index ? 'border-emerald-400 bg-emerald-400 text-blue-900' : 'border-blue-800 bg-blue-900 text-blue-400')"
                             class="w-10 h-10 rounded-full flex items-center justify-center border-4 transition-colors duration-300">
                             
                             <!-- Ícone Check para passos concluídos -->
                             <svg x-show="step > index" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                             
                             <!-- Ícones das etapas -->
                             <div x-show="step <= index" x-html="getStepIcon(index)"></div>
                        </div>
                    </div>
                </template>
            </div>
            <div class="text-center mt-3 text-sm font-bold text-white uppercase tracking-widest bg-blue-950/50 py-1.5 mx-auto max-w-[200px] rounded-full" x-text="stepNames[step]"></div>
        </div>

        <!-- Lista de Tarefas -->
        <div class="flex-1 p-4 pb-28 overflow-y-auto">
            <div class="space-y-4">
                <template x-for="item in currentChecklist()" :key="item.id">
                    <div @click="toggleCheck(item.id)" 
                         :class="checked[item.id] ? 'bg-emerald-50 border-emerald-500 scale-[0.99] opacity-75' : (item.highlight === 'alert' ? 'bg-orange-50/80 border-orange-300 shadow-sm' : (item.highlight === 'info' ? 'bg-blue-50/80 border-blue-300 shadow-sm' : 'bg-white border-slate-200 shadow-sm hover:border-blue-300'))"
                         class="p-4 rounded-2xl border-2 cursor-pointer transition-all duration-200 flex gap-4 items-start">
                        
                        <!-- Checkbox visual -->
                        <div :class="checked[item.id] ? 'bg-emerald-500 border-emerald-500' : 'border-slate-300 bg-slate-50'"
                             class="mt-0.5 shrink-0 w-7 h-7 rounded-full flex items-center justify-center border-2 transition-colors">
                            <svg x-show="checked[item.id]" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                        </div>

                        <!-- Texto da Tarefa -->
                        <div class="flex-1 pt-0.5">
                            <p :class="checked[item.id] ? 'text-slate-500 line-through' : 'text-slate-800 font-semibold'" class="text-sm leading-snug">
                                <!-- Ícone de Alerta -->
                                <svg x-show="item.highlight === 'alert' && !checked[item.id]" class="inline w-4 h-4 text-orange-500 mr-1.5 mb-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
                                <!-- Ícone de Info -->
                                <svg x-show="item.highlight === 'info' && !checked[item.id]" class="inline w-4 h-4 text-blue-500 mr-1.5 mb-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                                
                                <span x-text="item.text"></span>
                            </p>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Footer / Navegação -->
        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 pb-6 shadow-[0_-15px_40px_rgba(0,0,0,0.08)] z-20">
            <div class="max-w-md mx-auto flex justify-between gap-4">
                <button @click="step = Math.max(0, step - 1)" :disabled="step === 0"
                    :class="step === 0 ? 'bg-slate-50 text-slate-300 border border-slate-100' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 active:scale-95'"
                    class="flex-1 py-4 px-4 rounded-2xl font-bold text-sm transition-all">
                    Voltar
                </button>
                
                <button x-show="step < stepNames.length - 1" @click="step = Math.min(stepNames.length - 1, step + 1)"
                    :class="isStepComplete() ? 'bg-blue-900 text-white hover:bg-blue-800 shadow-[0_5px_15px_rgba(30,58,138,0.3)] active:scale-95' : 'bg-blue-50 text-blue-300 border border-blue-100'"
                    class="flex-[2] py-4 px-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 transition-all">
                    Avançar 
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </button>

                <button x-show="step === stepNames.length - 1" @click="finishApp()"
                    :class="isStepComplete() ? 'bg-emerald-500 text-white shadow-[0_5px_15px_rgba(16,185,129,0.3)] active:scale-95' : 'bg-emerald-50 text-emerald-200 border border-emerald-100'"
                    class="flex-[2] py-4 px-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 transition-all">
                    Finalizar OS 
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Lógica do App -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appData', () => ({
                screen: 'home',
                model: null,
                cycle: null,
                step: 0,
                checked: {},
                stepNames: ['Preparação', 'Desmontagem', 'Documentação', 'Despacho'],

                startApp() {
                    if(this.model && this.cycle) {
                        this.screen = 'checklist';
                        this.step = 0;
                        this.checked = {};
                    }
                },

                finishApp() {
                    if(this.isStepComplete()){
                        alert("Bancada finalizada com sucesso! Todas as etapas concluídas.");
                        this.screen = 'home';
                        this.model = null;
                        this.cycle = null;
                        window.scrollTo(0, 0);
                    }
                },

                toggleCheck(id) {
                    this.checked[id] = !this.checked[id];
                },

                isStepComplete() {
                    const list = this.currentChecklist();
                    if(!list || list.length === 0) return false;
                    return list.every(item => this.checked[item.id]);
                },

                getStepIcon(index) {
                    const icons = [
                        '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>',
                        '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
                        '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>',
                        '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>'
                    ];
                    return icons[index];
                },

                currentChecklist() {
                    if (!this.model || !this.cycle) return [];

                    const isA321 = this.model === 'A321';
                    const isA320 = this.model === 'A320' || this.model === 'A320 NEO';
                    const isOverhaul = this.cycle === 4;
                    const descartaVedacoes = isA321 ? true : (this.cycle === 2 || this.cycle === 4);

                    let step1 = [
                        { id: 'prep_1', text: 'Iniciar a OS no sistema Mysys e imprimir a capa.' },
                        { id: 'prep_2', text: 'Atualizar Planilha de Movimentação para o status "Bancada 1".' }
                    ];

                    let step2 = [
                        { id: 'desm_1', text: isA321 ? 'Atenção A321: Pegar SOMENTE o Piston House para desmontar.' : 'Atenção A320/NEO: Posicionar Torque Tube e Piston House na horizontal.', highlight: 'info' },
                        { id: 'desm_2', text: 'Ferramenta: Usar Soquete 5/16" com extensor e catraca para fixação principal. (Segurar parafuso por baixo).' },
                        { id: 'desm_3', text: 'Ferramenta: Usar Parafusadeira para os 3 parafusos maiores.' },
                        { id: 'desm_4', text: 'Ferramenta: Usar Soquete 1/4" para soltar os parafusos do tubinho.' }
                    ];

                    if (isA321) {
                        step2.push({ id: 'desm_5', text: 'Itens 160 (Bushing) e 170 (Trava): SALVAR. Vão para limpeza junto com o Piston.', highlight: 'info' });
                        step2.push({ id: 'desm_6', text: 'Item 180 (Vedação menor): DESCARTAR no lixo.', highlight: 'alert' });
                    }

                    if (isA320) {
                        step2.push({ id: 'desm_7', text: 'Item 230 (Seal Assembly): DESCARTAR no lixo. (Não existem itens 160/170 neste modelo).', highlight: 'alert' });
                    }

                    if (isOverhaul) {
                        step2.push({ id: 'desm_8', text: 'OVERHAUL (4º Ciclo): Levar Torque Tube à prensa para remover os pinos.', highlight: 'alert' });
                    }

                    step2.push({ 
                        id: 'desm_vedacoes', 
                        text: descartaVedacoes ? 'VEDAÇÕES PRINCIPAIS (Caneca/Pistão): Cortar e DESCARTAR no lixo.' : 'VEDAÇÕES PRINCIPAIS (Caneca/Pistão): SALVAR. Colocar no saquinho com fita verde (Tally Sheet + S/N) e guardar na pasta.',
                        highlight: descartaVedacoes ? 'alert' : 'info'
                    });

                    let step3 = [
                        { id: 'doc_1', text: 'Repair Request: Colar fita verde (BARCODE + S/N) no plástico protetor.' },
                        { id: 'doc_2', text: 'Repair Request: Preencher com "QSCMY63 - Oficina Limpeza Técnica".' },
                        { id: 'doc_3', text: 'Repair Request: Preencher com "Perform the cleaning IAW-IT-CPQ-004".' },
                        { id: 'doc_4', text: 'Repair Request: Preencher com "Identification Plate: IN".' },
                        { id: 'doc_5', text: `Component Restoration Form: Preencher NUMBER of cycles (${this.cycle}).` },
                        { id: 'doc_6', text: 'Component Restoration Form: Em Remarks escrever "This component was disassembled IAW page 3001 to 3012".' },
                        { id: 'doc_7', text: 'Assinatura: Carimbar (LATAM-6022470 Wellington), datar e rubricar abaixo da data.' }
                    ];

                    let step4 = [
                        { id: 'fin_1', text: isA321 ? 'LIMPEZA TÉCNICA 2: Enviar fisicamente -> Piston House + Itens 160 e 170 + Repair Request.' : 'LIMPEZA TÉCNICA 2: Enviar fisicamente -> Torque Tube + Piston House + Repair Request.' },
                        { id: 'fin_2', text: isA321 ? 'LOGÍSTICA DA PASTA: Guardar pasta no ARMÁRIO DE AGUARDO DE REPARO (junto com o Torque Tube).' : 'LOGÍSTICA DA PASTA: Guardar a pasta no ARMÁRIO PADRÃO da bancada.', highlight: isA321 ? 'alert' : 'info' },
                        { id: 'fin_3', text: 'SISTEMA: Atualizar Planilha de Movimentação para "Limpeza Técnica 2".' },
                        { id: 'fin_4', text: 'SISTEMA: Finalizar a Ordem de Serviço (OS) no Mysys.' },
                        { id: 'fin_5', text: 'DESPACHO: Colher a ASSINATURA do responsável pelo despacho do freio.', highlight: 'alert' }
                    ];

                    const allSteps = [step1, step2, step3, step4];
                    return allSteps[this.step];
                }
            }));
        });
    </script>
</body>
</html>
