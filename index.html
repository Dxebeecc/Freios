<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Setup LATAM - Freios (Módulos)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Proteção para a tela não piscar ou ficar branca */
        [x-cloak] { display: none !important; }
    </style>

    <!-- Alpine.js (O Motor Principal) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <!-- LÓGICA DO APP -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appData', () => ({
                screen: 'home',
                model: null,
                cycle: null,
                step: 0,
                activeModule: null, 
                checked: {},
                stepNames: ['Preparação', 'Desmontagem', 'Documentação', 'Despacho'],
                
                modalOpen: false,
                modalData: { imgUrl: '', manualPage: '', toolCode: '' },

                // --- DADOS DA GALERIA DE FERRAMENTAS (ATUALIZADA COM CARRINHOS) ---
                searchQuery: '',
                locModalOpen: false,
                activeTool: null,
                toolsList: [
                    {
                        name: 'Adaptor (Canecas e Drenagem)',
                        code: 'Q47963-T',
                        image: 'https://i.imgur.com/UOUvSSN.jpeg',
                        locations: ['Caixa 1 (Comp. Superior)', 'Caixa 2 (Comp. Superior)', 'Caixa 3 (Comp. Superior)', 'Caixa 5 (Comp. Superior)', 'Caixa 6 (Comp. Superior)', 'Caixa 7 (Comp. Superior)', 'Caixa 8 (Gaveta 3)', 'Caixa 9 (Comp. Superior)']
                    },
                    {
                        name: 'Compression Tool (A320)',
                        code: 'F26693000-T',
                        image: 'COLE_O_LINK_DO_IMGUR_AQUI',
                        locations: ['Caixa 1 (Comp. Superior)', 'Caixa 2 (Comp. Superior)', 'Caixa 3 (Comp. Superior)', 'Caixa 4 (Gaveta 2)', 'Caixa 5 (Comp. Superior)', 'Caixa 6 (Comp. Superior)', 'Caixa 7 (Gaveta 1)', 'Caixa 8 (Comp. Superior)', 'Caixa 9 (Gaveta 2)']
                    },
                    {
                        name: 'Spatula (Espátula)',
                        code: '89901-T',
                        image: 'COLE_O_LINK_DO_IMGUR_AQUI',
                        locations: ['Caixa 1 (Comp. Superior)', 'Caixa 2 (Comp. Superior)', 'Caixa 4 (Gaveta 2)', 'Caixa 5 (Comp. Superior)', 'Carro 10 (Gaveta B)']
                    },
                    {
                        name: 'Installation Cone 1',
                        code: 'Q47964-1-T',
                        image: 'COLE_O_LINK_DO_IMGUR_AQUI', 
                        locations: ['Caixa 1 (Comp. Superior)', 'Caixa 3 (Comp. Superior)', 'Caixa 4 (Gaveta 2)', 'Caixa 6 (Comp. Superior)', 'Caixa 7 (Gaveta 1)', 'Caixa 8 (Comp. Superior)', 'Caixa 9 (Gaveta 1)', 'Carro 8 (Gaveta C)']
                    },
                    {
                        name: 'Installation Cone 2',
                        code: 'Q47965-T',
                        image: 'COLE_O_LINK_DO_IMGUR_AQUI', 
                        locations: ['Caixa 1 (Gaveta 1)', 'Caixa 3 (Gaveta 1)', 'Caixa 4 (Gaveta 2)', 'Caixa 6 (Gaveta 2)', 'Caixa 7 (Gaveta 1)', 'Caixa 8 (Comp. Superior)', 'Caixa 9 (Gaveta 1)', 'Carro 7 (Gaveta A)', 'Carro 8 (Gaveta C)']
                    },
                    {
                        name: 'Compression Tool (A321)',
                        code: 'Q46498-T',
                        image: 'COLE_O_LINK_DO_IMGUR_AQUI',
                        locations: ['Carro 1 (Gaveta D)', 'Carro 7 (Gaveta A)', 'Carro 8 (Gaveta F)', 'Carro 10 (Gaveta A)']
                    },
                    {
                        name: 'Spanner (Canecas B777)',
                        code: 'R47166',
                        image: 'COLE_O_LINK_DO_IMGUR_AQUI',
                        locations: ['Carro 2 (Gaveta A)']
                    },
                    {
                        name: 'Riveting Tool (A320)',
                        code: 'AC21826000-1-T',
                        image: 'COLE_O_LINK_DO_IMGUR_AQUI',
                        locations: ['Carro 2 (Em Cima)', 'Carro 10 (Gaveta A)']
                    },
                    {
                        name: 'Spring Removal/Install (B777)',
                        code: 'R47163',
                        image: 'COLE_O_LINK_DO_IMGUR_AQUI',
                        locations: ['Carro 1 (Gaveta D)', 'Carro 7 (Gaveta A)', 'Carro 8 (Gaveta E)', 'Carro 10 (Gaveta A)']
                    }
                ],

                get filteredTools() {
                    if (this.searchQuery === '') return this.toolsList;
                    const q = this.searchQuery.toLowerCase();
                    return this.toolsList.filter(t => {
                        return t.name.toLowerCase().includes(q) || t.code.toLowerCase().includes(q);
                    });
                },

                openLocationModal(tool) {
                    this.activeTool = tool;
                    this.locModalOpen = true;
                },

                closeLocationModal() {
                    this.locModalOpen = false;
                    this.activeTool = null;
                },
                // ----------------------------------------

                startApp() {
                    if(this.model && this.cycle) {
                        this.screen = 'checklist';
                        this.step = 0;
                        this.checked = {};
                        window.scrollTo(0, 0);
                    }
                },

                openGallery() {
                    this.screen = 'gallery';
                    this.searchQuery = '';
                    window.scrollTo(0, 0);
                },

                finishApp() {
                    if(this.isStepComplete()){
                        alert("Bancada finalizada com sucesso! Todas as etapas concluídas.");
                        this.screen = 'home';
                        this.model = null;
                        this.cycle = null;
                        window.scrollTo(0, 0);
                    }
                },

                openModule(module) {
                    this.activeModule = module;
                    this.screen = 'module';
                    window.scrollTo(0, 0);
                },

                closeModule() {
                    this.activeModule = null;
                    this.screen = 'checklist';
                    window.scrollTo(0, 0);
                },

                toggleCheck(id) {
                    this.checked[id] = !this.checked[id];
                },

                openModalImage(refData) {
                    this.modalData = refData;
                    this.modalOpen = true;
                },

                closeModalImage() {
                    this.modalOpen = false;
                },

                isModuleComplete(module) {
                    if(!module || !module.items) return false;
                    return module.items.every(item => this.checked[item.id]);
                },

                isStepComplete() {
                    const modules = this.currentModules();
                    if(!modules || modules.length === 0) return false;
                    
                    for (let i = 0; i < modules.length; i++) {
                        const items = modules[i].items || [];
                        for (let j = 0; j < items.length; j++) {
                            if (!this.checked[items[j].id]) {
                                return false; 
                            }
                        }
                    }
                    return true;
                },

                getStepIcon(index) {
                    const icons = [
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1-1-1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>',
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>',
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>'
                    ];
                    return icons[index];
                },

                currentModules() {
                    if (!this.model || !this.cycle) return [];

                    const isA321 = this.model === 'A321';
                    const isB777 = this.model === 'B777';
                    const isA320 = this.model === 'A320' || this.model === 'A320 NEO';
                    const isOverhaul = this.cycle === 4;
                    const descartaVedacoesA32X = isA321 ? true : (this.cycle === 2 || this.cycle === 4);

                    let stepsData = [];

                    // --- ETAPA 0: PREPARAÇÃO ---
                    stepsData[0] = [
                        {
                            id: 'prep_mod',
                            title: 'Preparação de Sistema',
                            items: [
                                { id: 'prep_1', text: 'Iniciar a OS no sistema Mysys e imprimir a capa.' },
                                { id: 'prep_2', text: 'Atualizar Planilha de Movimentação para o status "Bancada 1".' }
                            ]
                        }
                    ];

                    // --- ETAPA 1: DESMONTAGEM ---
                    let drenagemItems = [];
                    if (isB777) {
                        drenagemItems.push({ id: 'dren_b1', text: 'AVISO: Usar proteção (pele e olhos). O fluido hidráulico é inflamável e perigoso.', highlight: 'alert' });
                        drenagemItems.push({ id: 'dren_b2', text: 'Desapertar e remover o parafuso (1-350) e a anilha de sangria (1-360).' });
                        
                        let drenoRef = isOverhaul ? {
                            imgUrl: 'https://i.imgur.com/oXx3aU6.jpeg',
                            manualPage: 'CMM Ref (Verificar CMM)',
                            toolCode: 'Conexão Hidráulica B777'
                        } : null;

                        drenagemItems.push({ 
                            id: 'dren_b3', 
                            text: 'Conectar a mangueira de dreno (ponta fina) e abaixar as canelas dos 6 pistões. Dica: Girar no sentido horário e bater levemente na lateral.', 
                            highlight: 'info',
                            reference: drenoRef
                        });
                        drenagemItems.push({ id: 'dren_b4', text: 'Após drenar, apertar o parafuso de sangria (1-380) com torque de 6,8 N.m (60.19 lbf.in).', highlight: 'alert' });
                    } else {
                        // SEQUÊNCIA DE DRENAGEM A320 / A321
                        drenagemItems.push({ 
                            id: 'dren_a1', 
                            text: 'AVISO: Usar equipamento de proteção (EPI) para pele e olhos. O fluido hidráulico é inflamável e altamente irritante.', 
                            highlight: 'alert' 
                        });
                        
                        drenagemItems.push({ 
                            id: 'dren_a2', 
                            text: 'Conectar a mangueira de dreno na conexão/válvula de sangria e direcionar a outra ponta para o recipiente de contenção adequado.' 
                        });
                        
                        drenagemItems.push({ 
                            id: 'dren_a3', 
                            text: 'Ferramenta: Utilizar o Adaptador (Q47963) para empurrar ("apertar") os pistões para baixo. Essa ação força a descida do pistão, esvaziando o fluido de dentro do Piston House para a mangueira.',
                            reference: {
                                imgUrl: 'https://i.imgur.com/UOUvSSN.jpeg',
                                manualPage: 'CMM Ref - Disassembly',
                                toolCode: 'Adaptador Q47963'
                            }
                        });
                        
                        drenagemItems.push({ 
                            id: 'dren_a4', 
                            text: 'DICA TÉCNICA (Circuito Dividido): Cada conexão de dreno está ligada a uma galeria de apenas 7 pistões. Após esvaziar um lado, é obrigatório trocar a válvula para drenar os 7 pistões do conjunto oposto.', 
                            highlight: 'info' 
                        });

                        drenagemItems.push({ 
                            id: 'dren_a5', 
                            text: 'DICA OPERACIONAL: Caso algum pistão esteja travado ou apresente resistência na operação, gire-o levemente no sentido horário enquanto aplica a força de compressão.', 
                            highlight: 'info' 
                        });
                    }

                    let torqueTubeItems = [];
                    if (isB777) {
                        if (isOverhaul) {
                            torqueTubeItems.push({ id: 'tt_b1', text: 'OVERHAUL (4º Ciclo): Não há intervenção de desmontagem no Torque Tube. Encaminhar unido. Verificar pág 5000 para envio ao NDT.', highlight: 'info' });
                        } else {
                            torqueTubeItems.push({ id: 'tt_b2', text: 'Torque Tube: Nenhuma ação de desmontagem requerida nesta ordem de serviço.' });
                        }
                    } else {
                        torqueTubeItems.push({ id: 'desm_1', text: isA321 ? 'Atenção A321: Separar e fixar na bancada SOMENTE o Piston House para abrir.' : 'Atenção A320/NEO: Posicionar Torque Tube e Piston House alinhados na horizontal.', highlight: 'info' });
                        torqueTubeItems.push({ id: 'desm_2', text: 'Ferramenta: Usar Soquete 5/16" com extensor longo e catraca para fixação principal. (Segurar o parafuso por baixo).' });
                        torqueTubeItems.push({ id: 'desm_3', text: 'Ferramenta: Usar Parafusadeira pneumática para remover os 3 parafusos maiores da carcaça.' });
                        if (isOverhaul) {
                            torqueTubeItems.push({ id: 'desm_8', text: 'OVERHAUL (4º Ciclo): Levar Torque Tube à prensa hidráulica para a remoção segura dos pinos.', highlight: 'alert' });
                        }
                    }

                    let pistonHouseItems = [];
                    if (isB777) {
                        pistonHouseItems.push({ id: 'ph_b_aviso', text: 'AVISO DE SEGURANÇA: Não empurrar os pistões (1-240) para dentro das camisas enquanto instalados, pode causar espirro de fluido hidráulico.', highlight: 'alert' });
                        
                        if (isOverhaul) {
                            pistonHouseItems.push({ 
                                id: 'ph_b_conexao', 
                                text: 'OVERHAUL: Remover a conexão de entrada do fluido hidráulico (Hydraulic Port / Fitting) para drenagem completa e inspeção.',
                                highlight: 'info',
                                reference: {
                                    imgUrl: 'https://i.imgur.com/oXx3aU6.jpeg',
                                    manualPage: 'CMM Ref (Verificar CMM)',
                                    toolCode: 'Conexão Hidráulica B777'
                                }
                            });
                        }

                        pistonHouseItems.push({ 
                            id: 'ph_b_insulator', 
                            text: 'Remover o "insulator assembly" (1-100) de cada pistão usando a ferramenta F27701000. CUIDADO: Não usar ferramentas afiadas.',
                            reference: {
                                imgUrl: 'https://i.imgur.com/reDKB9A.jpeg',
                                manualPage: 'Page 3009 / CMM 32-49-60',
                                toolCode: 'Tool F27701000'
                            }
                        });
                        
                        pistonHouseItems.push({ 
                            id: 'ph_b_sleeve', 
                            text: 'Desrosquear e remover as canecas (Return Piston Assemblies 1-090) utilizando a ferramenta especial R47166.',
                            reference: {
                                imgUrl: 'https://i.imgur.com/w9Fjg8u.jpeg',
                                manualPage: 'Page 3009 / CMM 32-49-60',
                                toolCode: 'Tool R47166'
                            }
                        });

                        if (isOverhaul) {
                            pistonHouseItems.push({ id: 'ph_b_ovh', text: 'OVERHAUL: Efetuar a desmontagem completa do alojamento. Alerta crítico: Remover todas as conexões e preservar a placa de identificação.', highlight: 'alert' });
                        }

                        pistonHouseItems.push({ id: 'ph_b_descarte', text: 'POLÍTICA DE DESCARTE (Poka-Yoke): Descartar permanentemente TODOS os anéis de vedação e partes internas do pistão no lixo em qualquer ciclo (1º ao 4º).', highlight: 'alert' });

                        pistonHouseItems.push({ 
                            id: 'ph_b_spring', 
                            text: 'Levar o pistão à prensa. Utilizar a ferramenta R47163 sobre o guia da mola para comprimir a mola (1-200) até acessar o "second groove" do pistão. Em seguida, remover o retaining ring (1-170) com o alicate adequado (Q46498).',
                            highlight: 'info',
                            reference: {
                                imgUrl: 'https://i.imgur.com/n85AF4P.jpeg',
                                manualPage: 'Page 3010 / CMM 32-49-60',
                                toolCode: 'Tool R47163 / Q46498'
                            }
                        });

                    } else {
                        if (isOverhaul) {
                            pistonHouseItems.push({ 
                                id: 'ph_a32x_conexao', 
                                text: 'OVERHAUL: Remover a conexão de entrada do fluido hidráulico (Hydraulic Port / Fitting). (Aguardando imagem específica do modelo).',
                                highlight: 'info',
                                reference: {
                                    imgUrl: 'https://images.unsplash.com/photo-1504148455328-c376907d081c?w=400',
                                    manualPage: 'CMM Ref (Aguardando)',
                                    toolCode: 'Conexão Hidráulica A32X'
                                }
                            });
                        }

                        pistonHouseItems.push({ id: 'desm_4', text: 'Ferramenta: Usar Soquete de bitola 1/4" para soltar com cuidado os parafusos de retenção do tubinho do pistão.' });
                        
                        pistonHouseItems.push({ 
                            id: 'desm_sleeve_a32x', 
                            text: 'Desrosquear e remover as canecas (Piston Sleeves 1-080 ou 2-110) utilizando a ferramenta especial correspondente.', 
                            highlight: 'info',
                            reference: {
                                imgUrl: 'https://i.imgur.com/EWLk3BW.jpeg',
                                manualPage: 'CMM Ref',
                                toolCode: 'Vedação Externa Caneca'
                            }
                        });

                        pistonHouseItems.push({ 
                            id: 'desm_pistao_a32x', 
                            text: 'Remover o pistão. Cortar e descartar a vedação externa conforme regra de ciclo.', 
                            highlight: 'info',
                            reference: {
                                imgUrl: 'https://i.imgur.com/mvo5WSk.jpeg',
                                manualPage: 'CMM Ref',
                                toolCode: 'Vedação Externa Pistão'
                            }
                        });

                        if (isA321) {
                            pistonHouseItems.push({ id: 'desm_5', text: 'Peça 160 (Bushing) e Peça 170 (Trava): SALVAR AMBAS. Colocar juntas no saco plástico para acompanhar a PASTA.', highlight: 'info' });
                            pistonHouseItems.push({ id: 'desm_6', text: 'Peça 180 (Vedação menor): Cortar e DESCARTAR na lixeira de resíduos contaminados.', highlight: 'alert' });
                        }
                        if (isA320) {
                            pistonHouseItems.push({ id: 'desm_7', text: 'Item 230 (Seal Assembly - Pág 10046): Remover e DESCARTAR obrigatoriamente no lixo (Lembrete: Itens 160/170 não constam nesta carcaça).', highlight: 'alert' });
                        }
                        pistonHouseItems.push({ 
                            id: 'desm_vedacoes', 
                            text: descartaVedacoesA32X ? 'VEDAÇÕES GRANDES (Caneca/Pistão): Cortar com estilete e DESCARTAR no lixo de descarte.' : 'VEDAÇÕES GRANDES (Caneca/Pistão): PRESERVAR. Acomodar no saquinho, grampear a fita verde e anexar à pasta física.',
                            highlight: descartaVedacoesA32X ? 'alert' : 'info'
                        });
                    }

                    stepsData[1] = [
                        { id: 'mod_drenagem', title: isB777 ? 'Drenar Óleo (6 Pistões)' : 'Drenar Fluido Hidráulico', items: drenagemItems },
                        { id: 'mod_torque', title: 'Torque Tube', items: torqueTubeItems },
                        { id: 'mod_piston', title: 'Piston House', items: pistonHouseItems }
                    ];

                    // --- ETAPA 2: DOCUMENTAÇÃO ---
                    stepsData[2] = [
                        {
                            id: 'doc_mod',
                            title: 'Formulários e Fitas',
                            items: [
                                { id: 'doc_1', text: 'Repair Request: Fixar fita adesiva verde contendo o BARCODE legível e o S/N no invólucro plástico protetor.' },
                                { id: 'doc_2', text: 'Repair Request (Campo Oficina): Preencher com "QSCMY63 - Oficina Limpeza Técnica".' },
                                { id: 'doc_3', text: 'Repair Request (Instrução Operacional): Escrever: "Perform the cleaning IAW-IT-CPQ-004".' },
                                { id: 'doc_4', text: 'Repair Request (Plaqueta de Identificação): Registrar a frase padrão: "Identification Plate: IN".' },
                                { id: 'doc_5', text: `Component Restoration Form (Histórico): Informar com precisão o NUMBER of cycles (${this.cycle}).` },
                                { id: 'doc_6', text: 'Component Restoration Form (Remarks): Adicionar: "This component was disassembled IAW page 3001 to 3012".' },
                                { id: 'doc_7', text: 'Fechamento de Laudo: Aplicar carimbo (LATAM-6022470 Wellington), preencher data corrente e lançar rubrica.' },
                                { id: 'doc_8', text: 'DESPACHO FORMAL: Colher a assinatura física ou validação no terminal do responsável escalado para o despacho.', highlight: 'alert' }
                            ]
                        }
                    ];

                    // --- ETAPA 3: DESPACHO ---
                    let despachoItems = [];
                    if (isB777) {
                        despachoItems.push({ id: 'fin_1_b', text: 'FLUXO MATERIAL: Movimentar os conjuntos laváveis protegidos com o Repair Request para a área da Limpeza Técnica 2.' });
                        despachoItems.push({ id: 'fin_2_b', text: 'LOGÍSTICA INTERNA DA PASTA: Arquivar a documentação técnica no ARMÁRIO PADRÃO da oficina de freios.', highlight: 'info' });
                    } else {
                        despachoItems.push({ id: 'fin_1', text: isA321 ? 'FLUXO MATERIAL A321: Enviar para lavagem apenas o Piston House + Repair Request.' : 'FLUXO MATERIAL A320: Enviar o conjunto completo (Torque Tube + Piston House) com a guia Repair Request para a Limpeza Técnica 2.' });
                        
                        let textoLogisticaA320 = descartaVedacoesA32X 
                            ? 'LOGÍSTICA DA PASTA A320: Guardar a pasta física contendo os laudos no ARMÁRIO PADRÃO.' 
                            : 'LOGÍSTICA DA PASTA A320: Guardar a pasta física contendo os laudos e o lote de vedações no ARMÁRIO PADRÃO.';
                            
                        despachoItems.push({ id: 'fin_2', text: isA321 ? 'LOGÍSTICA DA PASTA A321: Guardar a pasta (Assegurar as peças 160/170 no saquinho) no ARMÁRIO DE AGUARDO DE REPARO.' : textoLogisticaA320, highlight: isA321 ? 'alert' : 'info' });
                    }
                    despachoItems.push({ id: 'fin_3', text: 'LANÇAMENTO SISTÊMICO: Atualizar a Planilha de Movimentação Logística para o status de "Limpeza Técnica 2".' });
                    despachoItems.push({ id: 'fin_4', text: 'BAIXA OPERACIONAL: Realizar a baixa técnica definitiva e encerramento da Ordem de Serviço (OS) dentro do Mysys.' });

                    stepsData[3] = [
                        {
                            id: 'fin_mod',
                            title: 'Destinos e Sistema',
                            items: despachoItems
                        }
                    ];

                    return stepsData[this.step] || [];
                }
            }));
        });
    </script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased min-h-screen" x-data="appData">

    <!-- TELA 1: INICIAL (HOME) -->
    <div x-show="screen === 'home'" x-cloak class="min-h-screen flex flex-col items-center">
        <div class="w-full max-w-md bg-white min-h-screen shadow-2xl flex flex-col">
            <div class="bg-red-600 p-8 text-white text-center rounded-b-3xl shadow-lg relative">
                <!-- Botão para a Galeria -->
                <button @click="openGallery()" class="absolute top-6 right-6 p-2 bg-white/20 hover:bg-white/30 rounded-full transition" title="Acervo de Ferramentas">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                </button>

                <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-3 opacity-90"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l5 5-3 3-3-1-1 1 2.5 4.5L11 23l1-1-1-3 3-3 5 5 1.2-.7c.4-.2.7-.6.6-1.1z"/></svg>
                <h1 class="text-3xl font-extrabold tracking-tight">Setup LATAM</h1>
                <p class="text-red-100 mt-1 font-medium">Guia Operacional Avançado</p>
            </div>

            <div class="flex-1 p-6 flex flex-col justify-center space-y-8">
                <div>
                    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4 ml-1">1. Qual o equipamento?</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <template x-for="m in ['A320', 'A320 NEO', 'A321', 'B777']" :key="m">
                            <button @click="model = m" 
                                :class="model === m ? 'bg-blue-900 text-white shadow-lg transform scale-105' : 'bg-gray-50 text-gray-600 border border-gray-200 hover:bg-gray-100'"
                                class="py-4 px-2 rounded-2xl text-sm font-bold transition-all duration-200" x-text="m"></button>
                        </template>
                    </div>
                </div>

                <div>
                    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4 ml-1">2. Qual o ciclo?</h2>
                    <div class="grid grid-cols-4 gap-3">
                        <template x-for="c in [1, 2, 3, 4]" :key="c">
                            <button @click="cycle = c"
                                :class="cycle === c ? 'bg-red-600 text-white shadow-lg transform scale-105' : 'bg-gray-50 text-gray-600 border border-gray-200 hover:bg-gray-100'"
                                class="py-4 px-2 rounded-2xl text-sm font-bold transition-all duration-200 flex flex-col items-center justify-center gap-1">
                                <span class="text-lg" x-text="c + 'º'"></span>
                                <span x-show="c === 4" class="uppercase tracking-wider opacity-90" style="font-size: 9px;">Overhaul</span>
                                <span x-show="c !== 4" class="uppercase tracking-wider opacity-70" style="font-size: 9px;">Reparo</span>
                            </button>
                        </template>
                    </div>
                </div>

                <button @click="startApp()" :disabled="!model || !cycle"
                    :class="(model && cycle) ? 'bg-green-500 hover:bg-green-600 text-white shadow-lg' : 'bg-gray-100 text-gray-300 cursor-not-allowed'"
                    class="w-full py-4 mt-8 rounded-2xl font-bold text-lg flex items-center justify-center gap-2 transition-all duration-300 transform active:scale-95">
                    Iniciar Bancada 
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- TELA NOVA: GALERIA DE FERRAMENTAS -->
    <div x-show="screen === 'gallery'" x-cloak class="min-h-screen flex flex-col w-full max-w-md mx-auto bg-gray-50 relative shadow-2xl">
        <div class="bg-blue-900 text-white p-4 pt-6 shadow-md sticky top-0 z-20">
            <div class="flex items-center gap-4 mb-4">
                <button @click="screen = 'home'" class="p-2 bg-blue-800 rounded-full hover:bg-blue-700 transition transform active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <div>
                    <h1 class="font-black text-xl tracking-wide">Acervo de Ferramentas</h1>
                    <p class="text-blue-200 text-xs uppercase tracking-widest font-semibold mt-1">Consulta e Localização</p>
                </div>
            </div>
            <!-- Barra de Pesquisa -->
            <div class="relative">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="w-4 h-4 text-blue-300" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/></svg>
                </div>
                <input type="search" x-model="searchQuery" class="block w-full p-3 pl-10 text-sm text-gray-900 border border-transparent rounded-xl bg-blue-950/50 placeholder-blue-300 focus:ring-blue-500 focus:border-blue-500 focus:bg-white focus:text-blue-900 transition-colors" placeholder="Pesquisar por nome ou P/N..." required>
            </div>
        </div>

        <div class="flex-1 p-4 pb-8 overflow-y-auto space-y-4">
            <template x-for="tool in filteredTools" :key="tool.code">
                <div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden flex flex-col">
                    <div class="h-32 bg-gray-100 flex items-center justify-center p-2 border-b border-gray-100 relative">
                        <!-- Imagem com fallback caso o link não esteja preenchido -->
                        <img :src="tool.image && tool.image !== 'COLE_O_LINK_DO_IMGUR_AQUI' ? tool.image : 'https://images.unsplash.com/photo-1586864387967-d02ef85d93e8?w=400'" alt="Tool" class="max-h-full object-contain mix-blend-multiply opacity-80">
                        <div x-show="!tool.image || tool.image === 'COLE_O_LINK_DO_IMGUR_AQUI'" class="absolute inset-0 flex items-center justify-center bg-gray-100 bg-opacity-80">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest bg-white px-3 py-1 rounded-full shadow-sm border border-gray-200">Aguardando Foto</span>
                        </div>
                    </div>
                    <div class="p-4 flex justify-between items-center">
                        <div>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest" x-text="tool.name"></p>
                            <h3 class="text-lg font-black text-blue-900" x-text="tool.code"></h3>
                        </div>
                        <button @click="openLocationModal(tool)" class="w-10 h-10 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center hover:bg-orange-200 transition transform active:scale-95 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                        </button>
                    </div>
                </div>
            </template>
            <div x-show="filteredTools.length === 0" class="text-center p-8 text-gray-400">
                <p>Nenhuma ferramenta encontrada.</p>
            </div>
        </div>
    </div>

    <!-- TELA 2: LISTA DE MÓDULOS -->
    <div x-show="screen === 'checklist'" x-cloak class="min-h-screen flex flex-col w-full max-w-md mx-auto bg-gray-50 relative shadow-2xl">
        <div class="bg-blue-900 text-white p-4 pt-6 shadow-md sticky top-0 z-20">
            <div class="flex items-center justify-between mb-6">
                <button @click="screen = 'home'" class="p-2 bg-blue-800 rounded-full hover:bg-blue-700 transition transform active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                </button>
                <div class="text-center">
                    <h1 class="font-black text-xl tracking-wide" x-text="model"></h1>
                    <p class="text-blue-200 text-xs uppercase tracking-widest font-semibold mt-1">
                        <span x-text="cycle + 'º Ciclo '"></span><span x-text="cycle === 4 ? '(Overhaul)' : '(Reparo)'"></span>
                    </p>
                </div>
                <div class="w-9"></div>
            </div>

            <div class="flex justify-between relative px-4">
                <div class="absolute top-1/2 left-8 right-8 h-1 bg-blue-800 transform -translate-y-1/2 rounded-full"></div>
                <template x-for="(name, index) in stepNames" :key="index">
                    <div class="flex flex-col items-center gap-1 bg-blue-900 px-2 relative z-10">
                        <div :class="step === index ? 'border-white bg-red-600 text-white shadow-lg' : (step > index ? 'border-green-400 bg-green-400 text-blue-900' : 'border-blue-800 bg-blue-900 text-blue-400')"
                             class="w-10 h-10 rounded-full flex items-center justify-center border-4 transition-colors duration-300">
                             <svg x-show="step > index" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                             <div x-show="step <= index" x-html="getStepIcon(index)"></div>
                        </div>
                    </div>
                </template>
            </div>
            <div class="text-center mt-3 text-sm font-bold text-white uppercase tracking-widest bg-blue-900 bg-opacity-50 py-1.5 mx-auto max-w-xs rounded-full" x-text="stepNames[step]"></div>
        </div>

        <div class="flex-1 p-5 pb-32 overflow-y-auto">
            <p class="text-gray-500 text-sm font-semibold mb-4 text-center">Selecione a operação para visualizar os detalhes:</p>
            <div class="space-y-4">
                <template x-for="module in currentModules()" :key="module.id">
                    <button @click="openModule(module)" 
                        class="w-full flex justify-between items-center bg-white border border-gray-200 shadow-sm p-5 rounded-2xl text-blue-900 font-extrabold text-base uppercase tracking-wider transition-all transform hover:border-blue-300 active:scale-95 group">
                        
                        <div class="flex items-center gap-4 text-left">
                            <div :class="isModuleComplete(module) ? 'bg-green-500 border-green-500 text-white' : 'bg-gray-50 border-gray-300 text-gray-300'" class="w-8 h-8 rounded-full border-2 flex items-center justify-center transition-colors">
                                <svg x-show="isModuleComplete(module)" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 12 2 2 4-4"/></svg>
                            </div>
                            <span x-text="module.title" :class="isModuleComplete(module) ? 'text-green-700' : ''"></span>
                        </div>
                        
                        <div class="w-8 h-8 bg-blue-50 rounded-full flex items-center justify-center group-hover:bg-blue-100 transition-colors">
                            <svg class="w-5 h-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                        </div>
                    </button>
                </template>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 pb-6 shadow-2xl z-20">
            <div class="max-w-md mx-auto flex justify-between gap-4">
                <button @click="step = Math.max(0, step - 1)" :disabled="step === 0"
                    :class="step === 0 ? 'bg-gray-50 text-gray-300 border border-gray-100' : 'bg-gray-100 text-gray-600 hover:bg-gray-200 transform active:scale-95'"
                    class="flex-1 py-4 px-4 rounded-2xl font-bold text-sm transition-all">
                    Voltar
                </button>
                
                <button x-show="step < stepNames.length - 1" @click="step = Math.min(stepNames.length - 1, step + 1)"
                    :class="isStepComplete() ? 'bg-blue-900 text-white hover:bg-blue-800 shadow-lg transform active:scale-95' : 'bg-blue-50 text-blue-300 border border-blue-100'"
                    class="flex-none w-2/3 py-4 px-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 transition-all">
                    Avançar Etapa
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </button>

                <button x-show="step === stepNames.length - 1" @click="finishApp()"
                    :class="isStepComplete() ? 'bg-green-500 text-white shadow-lg transform active:scale-95' : 'bg-green-50 text-green-200 border border-green-100'"
                    class="flex-none w-2/3 py-4 px-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 transition-all">
                    Finalizar OS 
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- ECRÃ 3: SUB-ABA (MÓDULOS DOS CHECKS) -->
    <div x-show="screen === 'module'" x-cloak class="min-h-screen flex flex-col w-full max-w-md mx-auto bg-gray-50 relative shadow-2xl">
        <div class="bg-white p-4 pt-6 shadow-sm sticky top-0 z-20 border-b border-gray-200">
            <div class="flex items-center gap-4">
                <button @click="closeModule()" class="p-2 bg-gray-100 text-gray-600 rounded-full hover:bg-gray-200 transition transform active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <div>
                    <p class="text-xs font-bold text-blue-600 uppercase tracking-widest" x-text="stepNames[step]"></p>
                    <h2 class="text-lg font-black text-gray-800 leading-tight" x-text="activeModule?.title || ''"></h2>
                </div>
            </div>
        </div>

        <div class="flex-1 p-4 pb-32 overflow-y-auto space-y-4">
            <template x-for="item in (activeModule?.items || [])" :key="item.id">
                <div :class="checked[item.id] ? 'bg-green-50 border-green-500 transform scale-95 opacity-75' : (item.highlight === 'alert' ? 'bg-orange-50 bg-opacity-80 border-orange-300 shadow-sm' : (item.highlight === 'info' ? 'bg-blue-50 bg-opacity-80 border-blue-300 shadow-sm' : 'bg-white border-gray-200 shadow-sm'))"
                     class="p-4 rounded-xl border-2 flex gap-4 items-start transition-all duration-200">
                    
                    <div @click="toggleCheck(item.id)" :class="checked[item.id] ? 'bg-green-500 border-green-500' : 'border-gray-300 bg-gray-50'"
                         class="mt-0.5 flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center border-2 transition-colors cursor-pointer">
                        <svg x-show="checked[item.id]" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m20 6-11 11-5-5"/></svg>
                    </div>

                    <div class="flex-1 pt-0.5 flex flex-col gap-2">
                        <p :class="checked[item.id] ? 'text-gray-500 line-through' : 'text-gray-800 font-semibold'" class="text-sm leading-snug">
                            <svg x-show="item.highlight === 'alert' && !checked[item.id]" class="inline w-4 h-4 text-orange-500 mr-1.5 mb-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
                            <svg x-show="item.highlight === 'info' && !checked[item.id]" class="inline w-4 h-4 text-blue-500 mr-1.5 mb-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                            <span x-text="item.text"></span>
                        </p>

                        <!-- BOTÃO DE SUPORTE VISUAL -->
                        <template x-if="item.reference">
                            <button @click="openModalImage(item.reference)" class="w-auto inline-flex items-center gap-1.5 px-3 py-1 bg-blue-50 text-blue-700 hover:bg-blue-100 border border-blue-200 rounded-lg text-xs font-bold uppercase tracking-wider transition-colors mt-1 self-start">
                                <svg style="width: 14px; height: 14px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                                Ver Referência
                            </button>
                        </template>
                    </div>
                </div>
            </template>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 pb-6 shadow-2xl z-20">
            <div class="max-w-md mx-auto">
                <button @click="closeModule()"
                    :class="isModuleComplete(activeModule) ? 'bg-blue-900 text-white hover:bg-blue-800 shadow-lg' : 'bg-gray-200 text-gray-700'"
                    class="w-full py-4 px-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 transition-all transform active:scale-95">
                    <span x-text="isModuleComplete(activeModule) ? 'Módulo Concluído - Voltar' : 'Voltar para Lista'"></span>
                    <svg x-show="isModuleComplete(activeModule)" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 12 2 2 4-4"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL DE REFERÊNCIA (IMAGENS DOS CHECKS) -->
    <div x-show="modalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 transition-opacity duration-300" style="background-color: rgba(15, 23, 42, 0.8);" @click.self="closeModalImage()">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl border border-gray-100 flex flex-col" style="max-height: 85vh;">
            <div class="bg-gray-900 text-white p-4 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                    <span class="font-extrabold text-xs uppercase tracking-widest text-gray-300">Apoio Visual / Tool</span>
                </div>
                <button @click="closeModalImage()" class="p-1 text-gray-400 hover:text-white rounded-full bg-gray-800 transition shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 bg-gray-100 flex flex-col items-center justify-center" style="min-height: 250px;">
                <img :src="modalData.imgUrl" class="max-w-full object-contain rounded-xl shadow-md border border-gray-200 bg-white" style="max-height: 40vh;" alt="Referência Técnica">
            </div>
            <div class="bg-white p-4 border-t border-gray-200 space-y-2">
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div class="bg-gray-50 p-2.5 rounded-xl border border-gray-200">
                        <p class="text-gray-400 font-bold uppercase tracking-wider" style="font-size: 9px;">Manual Ref.</p>
                        <p class="text-gray-800 font-bold mt-0.5 truncate" x-text="modalData.manualPage"></p>
                    </div>
                    <div class="bg-blue-50 p-2.5 rounded-xl border border-blue-200">
                        <p class="text-blue-500 font-bold uppercase tracking-wider" style="font-size: 9px;">CMM Tool / Part</p>
                        <p class="text-blue-900 font-black mt-0.5 truncate" x-text="modalData.toolCode"></p>
                    </div>
                </div>
                <button @click="closeModalImage()" class="w-full py-3 mt-2 bg-blue-900 text-white font-bold text-sm rounded-xl hover:bg-blue-800 transition">
                    Fechar Referência
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL DE LOCALIZAÇÃO (PÁGINA DA GALERIA) -->
    <div x-show="locModalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 transition-opacity duration-300" style="background-color: rgba(15, 23, 42, 0.8);" @click.self="closeLocationModal()">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl border border-gray-100 flex flex-col">
            <div class="bg-orange-500 text-white p-5 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                    <div>
                        <span class="block font-black text-lg leading-tight" x-text="activeTool?.code"></span>
                        <span class="block text-xs uppercase tracking-widest text-orange-100" x-text="activeTool?.name"></span>
                    </div>
                </div>
            </div>
            <div class="bg-gray-50 p-5 max-h-[50vh] overflow-y-auto">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Encontrada nos locais:</p>
                <div class="space-y-2">
                    <template x-for="(loc, index) in activeTool?.locations" :key="index">
                        <div class="flex items-center gap-3 bg-white p-3 rounded-xl border border-gray-200 shadow-sm">
                            <div class="w-8 h-8 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center flex-shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                            </div>
                            <span class="text-sm font-bold text-gray-700" x-text="loc"></span>
                        </div>
                    </template>
                </div>
            </div>
            <div class="bg-white p-4 border-t border-gray-200">
                <button @click="closeLocationModal()" class="w-full py-3 bg-gray-100 text-gray-700 font-bold text-sm rounded-xl hover:bg-gray-200 transition">
                    Fechar
                </button>
            </div>
        </div>
    </div>

</body>
</html>
