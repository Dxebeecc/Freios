<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Setup LATAM - Freios (Módulos)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        [x-cloak] { display: none !important; }
    </style>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appData', () => ({
                screen: 'home',
                model: null,
                cycle: null,
                step: 0,
                activeModule: null, 
                checked: {},
                stepNames: ['Preparação', 'Desmontagem', 'Documentação', 'Despacho'],
                
                modalOpen: false,
                modalData: { imgUrl: '', manualPage: '', toolCode: '' },

                searchQuery: '',
                locModalOpen: false,
                activeTool: null,
                toolsList: [
                    { name: 'Adaptor (Canecas e Drenagem)', code: 'Q47963-T', image: 'https://i.imgur.com/UOUvSSN.jpeg', locations: ['Caixa 1 (Comp. Superior)', 'Caixa 2 (Comp. Superior)', 'Caixa 3 (Comp. Superior)', 'Caixa 5 (Comp. Superior)', 'Caixa 6 (Comp. Superior)', 'Caixa 7 (Comp. Superior)', 'Caixa 8 (Gaveta 3)', 'Caixa 9 (Comp. Superior)'] },
                    { name: 'Spanner (Canecas B777)', code: 'R47166', image: 'https://i.imgur.com/w9Fjg8u.jpeg', locations: ['Carro 2 (Gaveta A)'] },
                    { name: 'Tool (Insulator Assy B777)', code: 'F27701000-T', image: 'https://i.imgur.com/reDKB9A.jpeg', locations: ['Carro 1 (Gaveta D)'] },
                    { name: 'Spring Removal/Install (B777)', code: 'R47163', image: 'https://i.imgur.com/n85AF4P.jpeg', locations: ['Carro 1 (Gaveta D)', 'Carro 7 (Gaveta A)', 'Carro 8 (Gaveta E)', 'Carro 10 (Gaveta A)'] },
                    { name: 'Compression Tool (A320)', code: 'F26693000-T', image: 'COLE_O_LINK_DO_IMGUR_AQUI', locations: ['Caixa 1 (Comp. Superior)', 'Caixa 2 (Comp. Superior)', 'Caixa 3 (Comp. Superior)', 'Caixa 4 (Gaveta 2)', 'Caixa 5 (Comp. Superior)', 'Caixa 6 (Comp. Superior)', 'Caixa 7 (Gaveta 1)', 'Caixa 8 (Comp. Superior)', 'Caixa 9 (Gaveta 2)'] },
                    { name: 'Spatula (Espátula)', code: '89901-T', image: 'COLE_O_LINK_DO_IMGUR_AQUI', locations: ['Caixa 1 (Comp. Superior)', 'Caixa 2 (Comp. Superior)', 'Caixa 4 (Gaveta 2)', 'Caixa 5 (Comp. Superior)', 'Carro 10 (Gaveta B)'] },
                    { name: 'Installation Cone 1', code: 'Q47964-1-T', image: 'COLE_O_LINK_DO_IMGUR_AQUI', locations: ['Caixa 1 (Comp. Superior)', 'Caixa 3 (Comp. Superior)', 'Caixa 4 (Gaveta 2)', 'Caixa 6 (Comp. Superior)', 'Caixa 7 (Gaveta 1)', 'Caixa 8 (Comp. Superior)', 'Caixa 9 (Gaveta 1)', 'Carro 8 (Gaveta C)'] },
                    { name: 'Installation Cone 2', code: 'Q47965-T', image: 'COLE_O_LINK_DO_IMGUR_AQUI', locations: ['Caixa 1 (Gaveta 1)', 'Caixa 3 (Gaveta 1)', 'Caixa 4 (Gaveta 2)', 'Caixa 6 (Gaveta 2)', 'Caixa 7 (Gaveta 1)', 'Caixa 8 (Comp. Superior)', 'Caixa 9 (Gaveta 1)', 'Carro 7 (Gaveta A)', 'Carro 8 (Gaveta C)'] },
                    { name: 'Compression Tool (A321)', code: 'Q46498-T', image: 'COLE_O_LINK_DO_IMGUR_AQUI', locations: ['Carro 1 (Gaveta D)', 'Carro 7 (Gaveta A)', 'Carro 8 (Gaveta F)', 'Carro 10 (Gaveta A)'] },
                    { name: 'Riveting Tool (A320)', code: 'AC21826000-1-T', image: 'COLE_O_LINK_DO_IMGUR_AQUI', locations: ['Carro 2 (Em Cima)', 'Carro 10 (Gaveta A)'] }
                ],

                get filteredTools() {
                    if (this.searchQuery === '') return this.toolsList;
                    const q = this.searchQuery.toLowerCase();
                    return this.toolsList.filter(t => t.name.toLowerCase().includes(q) || t.code.toLowerCase().includes(q));
                },

                openLocationModalByCode(code) {
                    const tool = this.toolsList.find(t => t.code === code);
                    if (tool) {
                        this.activeTool = tool;
                        this.locModalOpen = true;
                    }
                },

                openLocationModal(tool) {
                    this.activeTool = tool;
                    this.locModalOpen = true;
                },

                closeLocationModal() {
                    this.locModalOpen = false;
                    this.activeTool = null;
                },
                
                // ... (restante das funções mantidas) ...
                startApp() { if(this.model && this.cycle) { this.screen = 'checklist'; this.step = 0; this.checked = {}; window.scrollTo(0, 0); } },
                openGallery() { this.screen = 'gallery'; this.searchQuery = ''; window.scrollTo(0, 0); },
                finishApp() { if(this.isStepComplete()){ alert("Bancada finalizada!"); this.screen = 'home'; this.model = null; this.cycle = null; window.scrollTo(0, 0); } },
                openModule(module) { this.activeModule = module; this.screen = 'module'; window.scrollTo(0, 0); },
                closeModule() { this.activeModule = null; this.screen = 'checklist'; window.scrollTo(0, 0); },
                toggleCheck(id) { this.checked[id] = !this.checked[id]; },
                openModalImage(refData) { this.modalData = refData; this.modalOpen = true; },
                closeModalImage() { this.modalOpen = false; },
                isModuleComplete(module) { if(!module || !module.items) return false; return module.items.every(item => this.checked[item.id]); },
                isStepComplete() { const modules = this.currentModules(); if(!modules || modules.length === 0) return false; for (let i = 0; i < modules.length; i++) { const items = modules[i].items || []; for (let j = 0; j < items.length; j++) { if (!this.checked[items[j].id]) return false; } } return true; },
                getStepIcon(index) { const icons = ['<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1-1-1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>','<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>','<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>','<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>']; return icons[index]; },
                currentModules() { /* ... LÓGICA MANTIDA ... */ }
            }));
        });
    </script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased min-h-screen" x-data="appData">
    <!-- ... (TELA HOME E GALERIA MANTIDAS) ... -->

    <!-- AJUSTE NO MODAL (DENTRO DO CHECKLIST/MODULE) -->
    <!-- Adicione este botão dentro do loop de itens, onde estão as referências: -->
    <template x-if="item.reference && item.reference.toolCode">
        <button @click="openLocationModalByCode(item.reference.toolCode.replace('-T', '').split(' / ')[0])" 
            class="w-10 h-10 flex-shrink-0 flex items-center justify-center bg-orange-100 text-orange-600 rounded-full hover:bg-orange-200 transition">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        </button>
    </template>
    
    <!-- ... (MODAIS MANTIDOS) ... -->
</body>
</html>
