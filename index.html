                // Filtro inteligente da Galeria
                get filteredTools() {
                    let list = this.toolsList;
                    if (this.searchQuery !== '') {
                        const q = this.searchQuery.toLowerCase();
                        return list.filter(t => t.name.toLowerCase().includes(q) || t.code.toLowerCase().includes(q));
                    }
                    if (this.currentCategory !== 'all') {
                        list = list.filter(t => t.cat === this.currentCategory);
                        if (this.expandedContainer) {
                            list = list.filter(t => t.loc === this.expandedContainer);
                            if (this.expandedSub) {
                                list = list.filter(t => t.sub === this.expandedSub);
                            }
                        }
                    }
                    return list;
                },

                get uniqueContainers() {
                    const filtered = this.toolsList.filter(t => t.cat === this.currentCategory);
                    return [...new Set(filtered.map(t => t.loc))];
                },

                get uniqueSubLocations() {
                    if (!this.expandedContainer) return [];
                    const filtered = this.toolsList.filter(t => t.loc === this.expandedContainer);
                    return [...new Set(filtered.map(t => t.sub))];
                },

                    const cleanCode = code.replace('-T', '').split(' / ')[0].trim().toLowerCase();

                    if (tool) {
                        this.screen = 'gallery';
                        this.searchQuery = tool.code;

                    } else {
                        alert("Ferramenta ou insumo localizado fisicamente apenas na caixa padrão do operador.");
                    }

                openModule(module) { this.activeModule = module; this.screen = 'module'; window.scrollTo(0, 0); },
                closeModule() { this.activeModule = null; this.screen = 'checklist'; window.scrollTo(0, 0); },
                toggleCheck(id) { this.checked[id] = !this.checked[id]; },
                openModalImage(title, refData) { this.modalData = { title: title, ...refData }; this.modalOpen = true; },
                closeModalImage() { this.modalOpen = false; },
                
                isModuleComplete(module) { 
                    if(!module || !module.items) return false; 
                    return module.items.every(item => this.checked[item.id]); 
                },
                
                isStepComplete() { 
                    const modules = this.currentModules(); 
                    if(!modules || modules.length === 0) return false; 
                    for (let i = 0; i < modules.length; i++) { 
                        const items = modules[i].items || []; 
                        for (let j = 0; j < items.length; j++) { 
                            if (!this.checked[items[j].id]) return false; 
                        } 
                    } 
                    return true; 
                },

                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>'
                    ]; 
                    return icons[index]; 
                },

                // ==========================================
                // CHECKLIST E PROCESSOS COMPLETOS RESTAURADOS
                // ==========================================
                currentModules() {
                    let modules = [];
                    
                    if (this.step === 0) { // Preparação
                        modules.push({
                            id: 'mod_prep_1', title: 'Recebimento e Inspeção', subtitle: 'Verificações iniciais de segurança',
                            items: [
                                { id: 'prep_1', text: 'Confirmar modelo da aeronave, P/N da unidade e documentação anexa (Repair Request).' },
                                { id: 'prep_2', text: 'Realizar inspeção visual preliminar em busca de danos estruturais severos ou vazamentos aparentes.' }
                            ]
                        });
                    }
                    
                    if (this.step === 1) { // Desmontagem
                        // Módulo principal que contém as imagens e referências restauradas
                        modules.push({
                            id: 'mod_piston', title: 'Piston Housing', subtitle: 'Desmontagem e Dreno',
                            items: [
                                { id: 'piston_1', text: 'Utilize EPI adequado (luvas e óculos) antes de iniciar a drenagem do fluido Skydrol.', warning: true },
                                { id: 'piston_2', text: 'Instale a ferramenta de compressão e remova os parafusos do conjunto principal para liberação segura.', reference: { imgUrl: 'https://i.imgur.com/reDKB9A.jpeg', manualPage: 'Page 3009 / CMM 32-49-60', toolCode: 'F26693000-T' } },
                                { id: 'piston_3', text: 'Separe cuidadosamente o alojamento dos pistões para evitar arranhões ou danos aos selos internos.' }
                            ]
                        });
                        
                        modules.push({
                            id: 'mod_heatsink', title: 'Heat Sink', subtitle: 'Separação dos discos de freio',
                            items: [
                                { id: 'heat_1', text: 'Remova sequencialmente os discos de rotor e estator da montagem principal.' },
                                { id: 'heat_2', text: 'Acomode os discos na bancada mantendo a ordem exata de remoção para facilitar a inspeção de desgaste nas próximas etapas.' }
                            ]
                        });
                        
                        modules.push({
                            id: 'mod_torquetube', title: 'Torque Tube', subtitle: 'Desacoplamento e inspeção visual',
                            items: [
                                { id: 'torque_1', text: 'Desconecte o tubo de torque da placa de pressão.' },
                                { id: 'torque_2', text: 'Inspecione visualmente por trincas evidentes, desgaste excessivo nos guias ou deformações na estrutura.' }
                            ]
                        });
                    }
                    
                    if (this.step === 2) { // Documentação
                        let docItems = [
                            { id: 'doc_1', text: 'Registrar todas as anomalias visuais encontradas durante a etapa de desmontagem.' },
                            { id: 'doc_2', text: 'Preencher adequadamente o formulário de rastreabilidade de componentes.' }
                        ];
                        // Condição de Overhaul mantida intacta
                        if (this.cycle === '4 (Overhaul)') {
                            docItems.push({ id: 'doc_overhaul', text: 'INSTRUÇÃO MANDATÓRIA (OVERHAUL): Incluir no Repair Request a instrução de remoção de tinta conforme norma IAW-IT-CPQ-007.', warning: true });
                        }
                        modules.push({ id: 'mod_docs', title: 'Registros e Repair Request', subtitle: 'Documentação do conjunto', items: docItems });
                    }
                    
                    if (this.step === 3) { // Despacho
                        modules.push({
                            id: 'mod_despacho', title: 'Acondicionamento e Envio', subtitle: 'Preparação para a próxima etapa',
                            items: [
                                { id: 'despacho_1', text: 'Proteger todas as conexões hidráulicas e roscas expostas com os tampões adequados.' },
                                { id: 'despacho_2', text: 'Acondicionar os subconjuntos na caixa de transporte apropriada e forrada.' },
                                { id: 'despacho_3', text: 'Encaminhar o conjunto devidamente documentado para o setor de lavagem e inspeção NDT.' }
                            ]
                        });
                    }
                    
                    return modules;
                }
            }));
        });
    </script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased min-h-screen" x-data="appData">

    <!-- ==================== TELA HOME ==================== -->
    <div x-show="screen === 'home'" x-cloak class="p-6 max-w-md mx-auto min-h-screen flex flex-col justify-center">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-blue-900 tracking-tight">LATAM <span class="text-red-600">Setup</span></h1>
            <p class="text-gray-500 mt-2 font-medium">Guia Operacional de Freios</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Modelo da Aeronave</label>
                <select x-model="model" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-base rounded-xl p-3.5 transition-colors">
                    <option value="" disabled selected>Selecione o modelo...</option>
                    <option value="A320">Airbus A320</option>
                    <option value="A321">Airbus A321</option>
                    <option value="B777">Boeing 777</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Ciclo de Manutenção</label>
                <select x-model="cycle" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-base rounded-xl p-3.5 transition-colors">
                    <option value="" disabled selected>Selecione o ciclo...</option>
                    <option value="1">1º Ciclo</option>
                    <option value="2">2º Ciclo</option>
                    <option value="3">3º Ciclo</option>
                    <option value="4 (Overhaul)">4º Ciclo (Overhaul)</option>
                </select>
            </div>

            <button @click="startApp()" 
                    :disabled="!model || !cycle"
                    :class="(!model || !cycle) ? 'bg-gray-300 text-gray-500' : 'bg-blue-900 text-white shadow-lg shadow-blue-900/30 hover:bg-blue-800'"
                    class="w-full font-bold rounded-xl text-lg px-5 py-4 text-center transition-all mt-4">
                Iniciar Bancada
            </button>
        </div>

        <!-- Botão para acessar a Galeria Nova -->
        <button @click="openGallery()" class="mt-8 flex items-center justify-center gap-2 w-full text-blue-900 font-bold p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:bg-gray-50 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
            Almoxarifado Digital Inteligente
        </button>
    </div>

    <!-- ==================== TELA CHECKLIST ==================== -->
    <div x-show="screen === 'checklist'" x-cloak class="pb-24 max-w-md mx-auto">
        <div class="bg-blue-900 text-white p-6 sticky top-0 z-20 shadow-md">
            <div class="flex justify-between items-center mb-4">
                <button @click="screen = 'home'" class="p-2 -ml-2 hover:bg-white/10 rounded-lg transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <div class="text-right">
                    <div class="text-sm text-blue-200 font-medium" x-text="model"></div>
                    <div class="text-xs font-bold bg-blue-800 px-2 py-1 rounded mt-1" x-text="'Ciclo: ' + cycle"></div>
                </div>
            </div>

            <!-- Progresso de Etapas -->
            <div class="flex justify-between items-center relative">
                <div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-1 bg-blue-800 -z-10"></div>
                <template x-for="(name, index) in stepNames" :key="index">
                    <div class="flex flex-col items-center">
                        <div @click="step = index" 
                             :class="step === index ? 'bg-white text-blue-900 ring-4 ring-blue-900/50' : (step > index ? 'bg-blue-400 text-white' : 'bg-blue-900 text-blue-400 border-2 border-blue-800')"
                             class="w-10 h-10 rounded-full flex items-center justify-center font-bold cursor-pointer transition-all z-10 shadow-sm"
                             x-html="getStepIcon(index)">
                        </div>
                    </div>
                </template>
            </div>
            <div class="text-center mt-3 font-bold text-lg tracking-wide uppercase" x-text="stepNames[step]"></div>
        </div>

        <div class="p-4 space-y-4">
            <!-- Renderização dos Módulos completos -->
            <template x-for="module in currentModules()" :key="module.id">
                <div @click="openModule(module)" 
                     class="bg-white rounded-xl p-5 border border-gray-200 shadow-sm flex items-center justify-between cursor-pointer active:scale-[0.98] transition-transform">
                    <div class="flex items-center gap-4">
                        <div :class="isModuleComplete(module) ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'" 
                             class="w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0">
                            <svg x-show="isModuleComplete(module)" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                            <svg x-show="!isModuleComplete(module)" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-900 text-lg" x-text="module.title"></h3>
                            <p class="text-sm text-gray-500 font-medium" x-text="module.subtitle"></p>
                        </div>
                    </div>
                    <svg class="text-gray-400" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </div>
            </template>
        </div>

        <div class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button @click="step < 3 ? step++ : finishApp()" 
                    :disabled="!isStepComplete() && step === 3"
                    :class="(!isStepComplete() && step === 3) ? 'bg-gray-300 text-gray-500' : 'bg-blue-900 text-white shadow-lg hover:bg-blue-800'"
                    class="w-full font-bold rounded-xl text-lg px-5 py-4 text-center transition-all flex justify-center items-center gap-2">
                <span x-text="step < 3 ? 'Próxima Etapa' : 'Finalizar Bancada'"></span>
                <svg x-show="step < 3" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </div>
    </div>

    <!-- ==================== TELA DO MÓDULO (CHECKBOXES E REFERÊNCIAS VISUAIS) ==================== -->
    <div x-show="screen === 'module'" x-cloak class="pb-24 max-w-md mx-auto min-h-screen bg-gray-50">
        <template x-if="activeModule">
            <div>
                <div class="bg-white border-b border-gray-200 p-4 sticky top-0 z-20 shadow-sm flex items-center gap-3">
                    <button @click="closeModule()" class="p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    </button>
                    <div>
                        <div class="text-xs font-bold text-blue-600 uppercase tracking-wider" x-text="stepNames[step]"></div>
                        <h2 class="font-black text-gray-900 text-xl" x-text="activeModule.title"></h2>
                    </div>
                </div>

                <div class="p-4 space-y-3">
                    <template x-for="(item, index) in activeModule.items" :key="item.id">
                        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
                            <label class="flex items-start gap-4 p-4 cursor-pointer hover:bg-gray-50 transition-colors">
                                <div class="relative flex items-center justify-center mt-0.5">
                                    <input type="checkbox" :checked="checked[item.id]" @change="toggleCheck(item.id)" class="peer sr-only">
                                    <div class="w-7 h-7 rounded border-2 border-gray-300 peer-checked:bg-blue-600 peer-checked:border-blue-600 transition-all flex items-center justify-center">
                                        <svg class="w-4 h-4 text-white opacity-0 peer-checked:opacity-100 scale-50 peer-checked:scale-100 transition-all" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                                    </div>
                                </div>
                                <div class="flex-1">
                                    <p :class="{'text-gray-900': !checked[item.id] && !item.warning, 'text-gray-400 line-through': checked[item.id], 'text-red-600 font-bold': item.warning && !checked[item.id]}" class="text-base leading-snug transition-all" x-text="item.text"></p>
                                </div>
                            </label>

                            <!-- Botões de Referência (Abrem a imagem e vinculam ao novo Almoxarifado) -->
                            <template x-if="item.reference">
                                <div class="px-4 pb-4 flex gap-2">
                                    <button @click="openModalImage(activeModule.title, item.reference)" class="flex-1 flex items-center justify-center gap-2 bg-blue-50 text-blue-700 py-2.5 px-3 rounded-lg text-sm font-bold border border-blue-100 hover:bg-blue-100 transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                                        <span x-text="'Ref. ' + item.reference.toolCode"></span>
                                    </button>
                                    <button @click="openLocationModalByCode(item.reference.toolCode)" class="w-11 h-11 flex-shrink-0 flex items-center justify-center bg-orange-100 text-orange-600 rounded-lg border border-orange-200 hover:bg-orange-200 transition-colors shadow-sm">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                                    </button>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>

                <div class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-200 p-4">
                    <button @click="closeModule()" class="w-full bg-gray-900 text-white font-bold rounded-xl text-lg px-5 py-4 text-center hover:bg-black transition-colors">Voltar para Lista</button>
                </div>
            </div>
        </template>
    </div>

    <!-- ==================== TELA ALMOXARIFADO DIGITAL ==================== -->
    <div x-show="screen === 'gallery'" x-cloak class="max-w-md mx-auto min-h-screen bg-gray-50 flex flex-col pb-10">
        <div class="bg-blue-900 text-white p-4 sticky top-0 z-20 shadow-md flex items-center gap-3">
            <button @click="screen = 'home'" class="p-2 -ml-2 hover:bg-white/10 rounded-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <h2 class="font-bold text-lg">Almoxarifado Inteligente</h2>
        </div>

        <div class="p-4 bg-white border-b border-gray-200 sticky top-[60px] z-10">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="w-5 h-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </div>
                <input type="text" x-model="searchQuery" @input="if(searchQuery !== '') currentCategory = 'all'" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-3" placeholder="P/N, Código LATAM ou nome da ferramenta...">
            </div>
        </div>

        <!-- Botões de Navegação Física -->
        <div x-show="searchQuery === ''" class="bg-white p-2 border-b border-gray-200 flex gap-1 overflow-x-auto text-xs font-bold uppercase tracking-wider">
            <button @click="currentCategory = 'all'; expandedContainer = null; expandedSub = null" :class="currentCategory === 'all' ? 'bg-blue-900 text-white' : 'bg-gray-100 text-gray-600'" class="px-3 py-2 rounded-lg flex-shrink-0 transition-colors">Tudo</button>
            <button @click="currentCategory = 'caixas'; expandedContainer = null; expandedSub = null" :class="currentCategory === 'caixas' ? 'bg-blue-900 text-white' : 'bg-gray-100 text-gray-600'" class="px-3 py-2 rounded-lg flex-shrink-0 transition-colors">Caixas (1-9)</button>
            <button @click="currentCategory = 'carros'; expandedContainer = null; expandedSub = null" :class="currentCategory === 'carros' ? 'bg-blue-900 text-white' : 'bg-gray-100 text-gray-600'" class="px-3 py-2 rounded-lg flex-shrink-0 transition-colors">Carros Bancada</button>
            <button @click="currentCategory = 'armarios'; expandedContainer = null; expandedSub = null" :class="currentCategory === 'armarios' ? 'bg-blue-900 text-white' : 'bg-gray-100 text-gray-600'" class="px-3 py-2 rounded-lg flex-shrink-0 transition-colors">Armários</button>
            <button @click="currentCategory = 'frotas'; expandedContainer = null; expandedSub = null" :class="currentCategory === 'frotas' ? 'bg-blue-900 text-white' : 'bg-gray-100 text-gray-600'" class="px-3 py-2 rounded-lg flex-shrink-0 transition-colors">Frotas (787/350)</button>
        </div>

        <div x-show="searchQuery === '' && currentCategory !== 'all'" class="p-4 space-y-2">
            <div x-show="!expandedContainer" class="grid grid-cols-2 gap-2">
                <template x-for="container in uniqueContainers" :key="container">
                    <button @click="expandedContainer = container" class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm text-left font-bold text-blue-900 hover:bg-blue-50 transition-colors flex flex-col justify-between h-24">
                        <svg class="text-blue-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
                        <span x-text="container"></span>
                    </button>
                </template>
            </div>

            <div x-show="expandedContainer && !expandedSub" class="space-y-2">
                <button @click="expandedContainer = null" class="text-sm font-bold text-red-600 flex items-center gap-1 mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> Voltar para lista
                </button>
                <div class="bg-blue-50 border border-blue-200 p-3 rounded-xl font-bold text-blue-900" x-text="expandedContainer"></div>
                
                <template x-for="sub in uniqueSubLocations" :key="sub">
                    <button @click="expandedSub = sub" class="w-full bg-white border border-gray-200 p-4 rounded-xl shadow-sm text-left font-semibold text-gray-700 hover:bg-gray-50 flex justify-between items-center">
                        <span x-text="sub"></span>
                        <svg class="text-gray-400" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                    </button>
                </template>
            </div>

            <button x-show="expandedSub" @click="expandedSub = null" class="text-sm font-bold text-red-600 flex items-center gap-1 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> Voltar para divisões
            </button>
        </div>

        <div class="p-4 space-y-2 flex-1 overflow-y-auto">
            <div x-show="searchQuery === '' && expandedSub" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-xs font-bold uppercase tracking-wide mb-3">
                Exibindo: <span x-text="expandedContainer"></span> &gt; <span x-text="expandedSub"></span>
            </div>

            <template x-for="tool in filteredTools" :key="tool.code + tool.loc + tool.sub">
                <div :class="tool.special ? 'border-l-4 border-l-orange-500' : 'border-l-4 border-l-blue-900'" class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-between gap-2">
                    <div>
                        <div class="flex items-center justify-between">
                            <span :class="tool.special ? 'bg-orange-100 text-orange-700' : 'bg-blue-50 text-blue-800'" class="text-[10px] font-black uppercase px-2 py-0.5 rounded" x-text="tool.special ? 'Special Tool' : 'Uso Geral / Apoio'"></span>
                            <span class="text-xs font-bold text-gray-400 font-mono" x-text="tool.code"></span>
                        </div>
                        <h3 class="font-bold text-gray-900 text-base mt-1" x-text="tool.name"></h3>
                    </div>
                    
                    <div class="bg-gray-50 border border-gray-100 p-2 rounded-lg flex items-center gap-2 mt-1">
                        <svg class="text-orange-600 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                        <p class="text-xs font-medium text-gray-600">
                            <span class="font-bold text-gray-900" x-text="tool.loc"></span> &bull; <span x-text="tool.sub"></span>
                        </p>
                    </div>
                </div>
            </template>

            <template x-if="filteredTools.length === 0">
                <div class="text-center py-10 text-gray-500">
                    Nenhum item localizado para os critérios informados.
                </div>
            </template>
        </div>
    </div>

    <!-- ==================== MODAL DE APOIO VISUAL ==================== -->
    <div x-show="modalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center px-4 bg-gray-900/80 backdrop-blur-sm transition-opacity">
        <div @click.away="closeModalImage()" class="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl flex flex-col">
            <div class="bg-gray-900 px-4 py-3 flex justify-between items-center text-white">
                <div class="flex items-center gap-2">
                    <svg class="text-blue-400" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                    <span class="font-bold text-sm tracking-wide uppercase" x-text="modalData.title"></span>
                </div>
                <button @click="closeModalImage()" class="p-1.5 bg-gray-800 rounded-full hover:bg-gray-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>

            <div class="bg-gray-100 p-4 flex items-center justify-center min-h-[200px]">
                <img :src="modalData.imgUrl" class="max-w-full rounded-lg shadow-sm border border-gray-200" alt="Referência Visual CMM">
            </div>

            <div class="p-5 space-y-3 bg-white">
                <div class="bg-gray-50 rounded-xl p-3 border border-gray-100">
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Manual Ref. (CMM)</div>
                    <div class="text-sm font-bold text-gray-900 break-words" x-text="modalData.manualPage"></div>
                </div>
                <div class="bg-blue-50 rounded-xl p-3 border border-blue-100">
                    <div class="text-[10px] font-bold text-blue-400 uppercase tracking-wider mb-1">CMM Tool P/N</div>
                    <div class="text-sm font-bold text-blue-900 break-words" x-text="modalData.toolCode"></div>
                </div>
                <button @click="closeModalImage()" class="w-full mt-4 bg-blue-900 text-white font-bold rounded-xl py-3.5 hover:bg-blue-800 transition-colors">Fechar Referência</button>
            </div>
        </div>
    </div>

</body>
</html>
