<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Setup LATAM - Freios (Módulos)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        /* Suaviza as transições de barra de rolagem */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appData', () => ({
                // --- ESTADOS GLOBAIS ---
                screen: 'home',
                process: null, 
                model: null,
                cycle: null,
                step: 0,
                activeModule: null, 
                checked: {},
                modalOpen: false,
                modalData: { imgUrl: '', manualPage: '', toolCode: '' },

                // --- ESTADOS DA GALERIA ---
                searchQuery: '',
                activeTab: 'all',
                selectedContainer: null,
                selectedSub: null,

                // --- ESTADOS: RED TAG (ETAPA 4) ---
                hasCondemned: false,
                selectedPieces: [],
                customPiece: '',
                condemnedReason: 'dimensional check',
                findingsSentence: '',

                // --- ESTADOS: OSR / MROSYS (ETAPA 5) ---
                tallyBarcode: '',
                snPiece: '',
                idPlate: '',

                // --- BANCO DE DADOS DE FERRAMENTAS ---
                toolsList: [
                    // CAIXA 1
                    { name: 'Adaptor (Special Tool)', code: 'Q47963-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', image: 'https://i.imgur.com/UOUvSSN.jpeg', special: true },
                    { name: 'Compression Tool (A320)', code: 'F26693000-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', image: 'https://i.imgur.com/reDKB9A.jpeg', special: true },
                    { name: 'Installation Cone 1', code: 'Q47964-1-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', image: '' },
                    { name: 'Installation Cone 2', code: 'Q47965-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Gaveta 1', image: '' },
                    { name: 'Spatula (Espátula)', code: '89901-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', image: '' },
                    { name: 'Adaptação 3/4 Válvula Fitting Assembly', code: 'MY18011-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', image: '' },
                    { name: 'Soquete 3/4', code: 'MY46SQ085', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', image: '' },
                    { name: 'Extensor', code: 'MY46EX055', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', image: '' },
                    { name: 'Braço de Torque', code: 'MY46BF007', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', image: '' },
                    { name: 'Macete', code: 'MY46MA002', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', image: '' },
                    { name: 'Soquete 1/4', code: 'MY46SQ238', cat: 'caixas', loc: 'Caixa 1', sub: 'Gaveta 1', image: '' },
                    { name: 'Alicate de Corte', code: 'MY46AL052', cat: 'caixas', loc: 'Caixa 1', sub: 'Gaveta 1', image: '' },
                    { name: 'Alicate de Freno', code: 'MY46AL050', cat: 'caixas', loc: 'Caixa 1', sub: 'Gaveta 2', image: '' },
                    { name: 'Chave Combinada 3/8', code: 'MY46CC030', cat: 'caixas', loc: 'Caixa 1', sub: 'Gaveta 3', image: '' },
                    { name: 'Alicate para Anel Trava (Beta)', code: 'MY46AL079', cat: 'caixas', loc: 'Caixa 1', sub: 'Gaveta 4', image: '' },

                    // CAIXA 2
                    { name: 'Adaptor (Special Tool)', code: 'Q47963-T', cat: 'caixas', loc: 'Caixa 2', sub: 'Compartimento Superior', image: 'https://i.imgur.com/UOUvSSN.jpeg', special: true },
                    { name: 'Compression Tool', code: 'F26693000-T', cat: 'caixas', loc: 'Caixa 2', sub: 'Compartimento Superior', image: 'https://i.imgur.com/reDKB9A.jpeg', special: true },
                    { name: 'Spatula (Espátula)', code: '89901-T', cat: 'caixas', loc: 'Caixa 2', sub: 'Compartimento Superior', image: '' },
                    { name: 'Soquete 13/16', code: 'MY46SQ029', cat: 'caixas', loc: 'Caixa 2', sub: 'Compartimento Superior', image: '' },
                    { name: 'Alicate para Anel (Beta)', code: 'MY46AL052', cat: 'caixas', loc: 'Caixa 2', sub: 'Gaveta 1', image: '' },
                    { name: 'Alicate de Freno', code: 'MY46AL068', cat: 'caixas', loc: 'Caixa 2', sub: 'Gaveta 2', image: '' },

                    // CARRO 1
                    { name: 'Testador de Molas', code: 'EQ0003', cat: 'carros', loc: 'Carro 1', sub: 'Parte Superior', image: '' },
                    { name: 'Base de Apoio - Freios A320', code: 'MY46063-T', cat: 'carros', loc: 'Carro 1', sub: 'Parte Superior', image: '', special: true },
                    { name: 'Calibration Block', code: 'CBS001-T', cat: 'carros', loc: 'Carro 1', sub: 'Gaveta A', image: '' },
                    { name: 'Paquímetro', code: 'PA9887S', cat: 'carros', loc: 'Carro 1', sub: 'Gaveta A', image: '' },
                    { name: 'Jogo de Soquetes', code: 'SQJO001', cat: 'carros', loc: 'Carro 1', sub: 'Gaveta B', image: '' },
                    { name: 'Ferramenta Desmontagem A320/B777', code: 'MY18027-T', cat: 'carros', loc: 'Carro 1', sub: 'Gaveta D', image: '', special: true },
                    { name: 'Tool (Insulator Assy B777)', code: 'F27701000-T', cat: 'carros', loc: 'Carro 1', sub: 'Gaveta D', image: 'https://i.imgur.com/reDKB9A.jpeg', special: true },
                    { name: 'Spring Removal/Install (B777)', code: 'R47163', cat: 'carros', loc: 'Carro 1', sub: 'Gaveta D', image: 'https://i.imgur.com/n85AF4P.jpeg', special: true },

                    // CARRO 2
                    { name: 'Spanner (Canecas B777)', code: 'R47166', cat: 'carros', loc: 'Carro 2', sub: 'Gaveta A', image: 'https://i.imgur.com/w9Fjg8u.jpeg' },
                    { name: 'Riveting Tool (A320)', code: 'AC21826000-1-T', cat: 'carros', loc: 'Carro 2', sub: 'Em Cima', image: '' },

                    // CARRO 8
                    { name: 'Shrinking Bush (Kit F26692000-T)', code: 'R46105-T', cat: 'carros', loc: 'Carro 8', sub: 'Gaveta A', image: '', special: true },
                    { name: 'Half Shell (Kit F26692000-T)', code: 'R46103-T', cat: 'carros', loc: 'Carro 8', sub: 'Gaveta A', image: '', special: true },
                    { name: 'Piston Installation Support Tool 7', code: '114-325-T', cat: 'carros', loc: 'Carro 8', sub: 'Gaveta B', image: '', special: true },
                    { name: 'Spring Removal/Install (B777)', code: 'R47163', cat: 'carros', loc: 'Carro 8', sub: 'Gaveta E', image: 'https://i.imgur.com/n85AF4P.jpeg', special: true },

                    // ARMÁRIOS 1 E 2
                    { name: 'Caneta Pneumática', code: 'MY46CPN001', cat: 'armarios', loc: 'Armário 2', sub: 'Prateleira A', image: '' },
                    { name: 'Relógio Comparador', code: 'RC0248', cat: 'armarios', loc: 'Armário 2', sub: 'Prateleira A', image: '' },
                    { name: 'Torquímetro 50-250 LBF.FT', code: 'TO0290', cat: 'armarios', loc: 'Armário 2', sub: 'Prateleira B', image: '' },
                    { name: 'Ferramenta de Fixação dos Bolts A320/A321', code: 'MY46037-T', cat: 'armarios', loc: 'Armário 2', sub: 'Prateleira C', image: '', special: true },
                    { name: 'Proteção p/ Jateamento de Pistões', code: 'MY46048-T', cat: 'armarios', loc: 'Armário 2', sub: 'Prateleira D', image: '', special: true },

                    // FROTAS ESPECIAIS: B787 e A350
                    { name: 'Tool, Brake Assembly (B787-9/10)', code: 'F28014000-T', cat: 'frotas', loc: 'Carro B787 - 9/10', sub: 'Parte Superior', image: '', special: true },
                    { name: 'EBA Carrier Guide (B787-9/10)', code: 'GS47892', cat: 'frotas', loc: 'Carro B787 - 9/10', sub: 'Caixa 2', image: '', special: true },
                    { name: 'Compression Tool (A350)', code: 'T45811', cat: 'frotas', loc: 'Palete A350', sub: 'Caixa 3', image: '', special: true }
                ],

                // --- FUNÇÕES DA GALERIA ---
                get filteredTools() {
                    let list = this.toolsList;
                    if (this.searchQuery !== '') {
                        const q = this.searchQuery.toLowerCase();
                        return list.filter(t => t.name.toLowerCase().includes(q) || t.code.toLowerCase().includes(q));
                    }
                    if (this.activeTab !== 'all') {
                        list = list.filter(t => t.cat === this.activeTab);
                        if (this.selectedContainer) {
                            list = list.filter(t => t.loc === this.selectedContainer);
                            if (this.selectedSub) {
                                list = list.filter(t => t.sub === this.selectedSub);
                            }
                        }
                    }
                    return list;
                },
                get uniqueContainers() {
                    const filtered = this.toolsList.filter(t => t.cat === this.activeTab);
                    return [...new Set(filtered.map(t => t.loc))];
                },
                get uniqueSubLocations() {
                    if (!this.selectedContainer) return [];
                    const filtered = this.toolsList.filter(t => t.loc === this.selectedContainer);
                    return [...new Set(filtered.map(t => t.sub))];
                },
                openLocationModalByCode(code) {
                    if(!code) return;
                    const cleanCode = code.replace('-T', '').split(' / ')[0].trim().toLowerCase();
                    const tool = this.toolsList.find(t => t.code.toLowerCase().includes(cleanCode));
                    if (tool) {
                        this.screen = 'gallery';
                        this.searchQuery = tool.code;
                        window.scrollTo(0, 0);
                    } else {
                        alert("Ferramenta mapeada na caixa padrão da oficina.");
                    }
                },

                // --- ROTEAMENTO E CONTROLES ---
                get currentStepNames() {
                    if (this.process === 'inspecao') {
                        return ['Limpeza NDT', 'Metrologia', 'Auditoria NDT', 'Red Tag', 'Pintura & OSR', 'Fechamento'];
                    }
                    return ['Preparação', 'Desmontagem', 'Documentação', 'Despacho'];
                },

                startApp() {
                    if(this.model && this.cycle) {
                        this.screen = 'processSelect';
                        window.scrollTo(0, 0);
                    }
                },
                startProcess(selectedProcess) {
                    this.process = selectedProcess;
                    this.screen = 'checklist';
                    this.step = 0;
                    this.checked = {};
                    
                    // Reset dos estados dinâmicos
                    this.hasCondemned = false;
                    this.selectedPieces = [];
                    this.customPiece = '';
                    this.findingsSentence = '';
                    this.tallyBarcode = '';
                    this.snPiece = '';
                    this.idPlate = '';

                    window.scrollTo(0, 0);
                },
                openGallery() {
                    this.screen = 'gallery';
                    this.searchQuery = '';
                    this.activeTab = 'all';
                    this.selectedContainer = null;
                    this.selectedSub = null;
                    window.scrollTo(0, 0);
                },
                finishApp() {
                    if(this.isStepComplete()){
                        alert(`OS de ${this.process.toUpperCase()} finalizada com sucesso!`);
                        this.screen = 'home';
                        this.model = null;
                        this.cycle = null;
                        this.process = null;
                        window.scrollTo(0, 0);
                    }
                },
                openModule(module) {
                    this.activeModule = module;
                    this.screen = 'module';
                    window.scrollTo(0, 0);
                },
                closeModule() {
                    this.activeModule = null;
                    this.screen = 'checklist';
                    window.scrollTo(0, 0);
                },
                toggleCheck(id) {
                    this.checked[id] = !this.checked[id];
                },
                openModalImage(refData) {
                    this.modalData = refData;
                    this.modalOpen = true;
                },
                closeModalImage() {
                    this.modalOpen = false;
                },
                isModuleComplete(module) {
                    if(!module || !module.items) return false;
                    return module.items.every(item => this.checked[item.id]);
                },
                isStepComplete() {
                    const modules = this.currentModules();
                    if(!modules || modules.length === 0) return false;
                    for (let i = 0; i < modules.length; i++) {
                        const items = modules[i].items || [];
                        for (let j = 0; j < items.length; j++) {
                            if (!this.checked[items[j].id]) return false; 
                        }
                    }
                    return true;
                },

                getStepIcon(index) {
                    const icons = [
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1-1-1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>',
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>',
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>',
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 2 4 4"/><path d="m17 7 3-3"/><path d="M19 9 8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5"/><path d="m9 11 4 4"/><path d="m5 19-3 3"/></svg>',
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>'
                    ];
                    return icons[index];
                },

                // --- FUNÇÕES RED TAG & OSR ---
                addCustomPiece() {
                    if (this.customPiece.trim() !== '') {
                        this.selectedPieces.push(this.customPiece.trim());
                        this.customPiece = '';
                        this.generateSentence();
                    }
                },
                clearCondemned() {
                    this.selectedPieces = [];
                    this.customPiece = '';
                    this.findingsSentence = '';
                },
                generateSentence() {
                    if (this.selectedPieces.length === 0) {
                        this.findingsSentence = "";
                        return;
                    }
                    let itemsText = "";
                    if (this.selectedPieces.length === 1) {
                        itemsText = this.selectedPieces[0];
                    } else {
                        const lastItem = this.selectedPieces[this.selectedPieces.length - 1];
                        const otherItems = this.selectedPieces.slice(0, -1).join(", ");
                        itemsText = `${otherItems} and ${lastItem}`;
                    }
                    if (this.selectedPieces.length > 1) {
                        this.findingsSentence = `${itemsText} were condemned during ${this.condemnedReason}`;
                    } else {
                        this.findingsSentence = `${itemsText} condemned during ${this.condemnedReason}`;
                    }
                },
                buildRemovalReason() {
                    const dataAtual = new Date().toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'}).toUpperCase();
                    return `Major Assy Barcode: ${this.tallyBarcode || '[Tally]'} - Major Assy S/N: ${this.snPiece || '[S/N]'} - Identification Plate: ${this.idPlate || '[ID]'} - Opening Date: ${dataAtual}`;
                },
                fillOidExample() {
                    this.tallyBarcode = 'T00X5JVE';
                    this.snPiece = '09360';
                    this.idPlate = '09';
                },
                getCMMRef() {
                    return this.model === 'B777' ? 'IAW CMM 32-49-60' : 'IAW CMM 32-47-61';
                },

                // --- MOTOR DE REGRAS PRINCIPAL ---
                currentModules() {
                    if (!this.model || !this.cycle || !this.process) return [];

                    const isA321 = this.model === 'A321';
                    const isB777 = this.model === 'B777';
                    const isA320 = this.model === 'A320' || this.model === 'A320 NEO';
                    const isOverhaul = this.cycle === 4;
                    const descartaVedacoesA32X = isA321 ? true : (this.cycle === 2 || this.cycle === 4);

                    let stepsData = [];

                    // ==========================================
                    // TRILHA 1: DESMONTAGEM (INTACTA)
                    // ==========================================
                    if (this.process === 'desmontagem') {
                        stepsData[0] = [
                            { id: 'prep_mod', title: 'Preparação de Sistema', items: [
                                { id: 'prep_1', text: 'Iniciar a OS no sistema Mysys e imprimir a capa.' },
                                { id: 'prep_2', text: 'Atualizar Planilha de Movimentação para o status "Bancada 1".' }
                            ]}
                        ];

                        let drenagemItems = [];
                        if (isB777) {
                            drenagemItems.push({ id: 'dren_b1', text: 'AVISO: Usar proteção (pele e olhos). O fluido hidráulico é inflamável e perigoso.', highlight: 'alert' });
                            drenagemItems.push({ id: 'dren_b2', text: 'Desapertar e remover o parafuso (1-350) e a anilha de sangria (1-360).' });
                            let drenoRef = isOverhaul ? { btnText: 'Ref. Conexão', imgUrl: 'https://i.imgur.com/oXx3aU6.jpeg', manualPage: 'CMM Ref (Verificar CMM)', toolCode: 'Conexão Hidráulica B777' } : null;
                            drenagemItems.push({ id: 'dren_b3', text: 'Conectar a mangueira de dreno (ponta fina) e abaixar as canelas dos 6 pistões.', highlight: 'info', reference: drenoRef });
                            drenagemItems.push({ id: 'dren_b4', text: 'Após drenar, apertar o parafuso de sangria (1-380) com torque de 6,8 N.m (60.19 lbf.in).', highlight: 'alert' });
                        } else {
                            drenagemItems.push({ id: 'dren_a1', text: 'AVISO: Usar equipamento de proteção (EPI) para pele e olhos. O fluido hidráulico é inflamável.', highlight: 'alert' });
                            drenagemItems.push({ id: 'dren_a2', text: 'Conectar a mangueira de dreno na conexão/válvula de sangria e direcionar a outra ponta para o recipiente adequado.' });
                            drenagemItems.push({ id: 'dren_a3', text: 'Empurrar ("apertar") os pistões para baixo forçando a descida e esvaziamento.' });
                            drenagemItems.push({ id: 'dren_a4', text: 'DICA: Trocar a válvula para drenar os 7 pistões do conjunto oposto.', highlight: 'info' });
                        }

                        let torqueTubeItems = [];
                        if (isB777) {
                            if (isOverhaul) torqueTubeItems.push({ id: 'tt_b1', text: 'OVERHAUL: Encaminhar unido. Verificar pág 5000 para envio ao NDT.', highlight: 'info' });
                            else torqueTubeItems.push({ id: 'tt_b2', text: 'Nenhuma ação de desmontagem requerida.' });
                        } else {
                            torqueTubeItems.push({ id: 'desm_1', text: isA321 ? 'Atenção A321: Separar e fixar na bancada SOMENTE o Piston House para abrir.' : 'Atenção A320/NEO: Posicionar Torque Tube e Piston House alinhados na horizontal.', highlight: 'info' });
                            torqueTubeItems.push({ id: 'desm_2', text: 'Usar Soquete 5/16" com extensor longo e catraca para fixação principal.' });
                            torqueTubeItems.push({ id: 'desm_3', text: 'Usar Parafusadeira pneumática para remover os 3 parafusos maiores.' });
                            if (isOverhaul) torqueTubeItems.push({ id: 'desm_8', text: 'OVERHAUL: Levar Torque Tube à prensa hidráulica para a remoção dos pinos.', highlight: 'alert' });
                        }

                        let pistonHouseItems = [];
                        if (isB777) {
                            pistonHouseItems.push({ id: 'ph_b_aviso', text: 'AVISO: Não empurrar os pistões para dentro das camisas enquanto instalados.', highlight: 'alert' });
                            if (isOverhaul) pistonHouseItems.push({ id: 'ph_b_ovh', text: 'OVERHAUL: Efetuar a desmontagem completa. Remover todas as conexões.', highlight: 'alert' });
                        } else {
                            pistonHouseItems.push({ id: 'desm_4', text: 'Usar Soquete 1/4" para soltar com cuidado os parafusos de retenção do tubinho.' });
                            pistonHouseItems.push({ id: 'desm_sleeve_a32x', text: 'Desrosquear e remover as canecas utilizando a ferramenta especial Adaptador (Q47963).', highlight: 'info' });
                            pistonHouseItems.push({ id: 'desm_pistao_a32x', text: 'Remover o pistão. Cortar e descartar a vedação externa.', highlight: 'info' });
                            if (isA321) {
                                pistonHouseItems.push({ id: 'desm_5', text: 'Peça 160 (Bushing) e Peça 170 (Trava): SALVAR AMBAS no saco plástico.', highlight: 'info' });
                                pistonHouseItems.push({ id: 'desm_6', text: 'Peça 180 (Vedação menor): Cortar e DESCARTAR.', highlight: 'alert' });
                            }
                            if (isA320) pistonHouseItems.push({ id: 'desm_7', text: 'Item 230: Remover e DESCARTAR.', highlight: 'alert' });
                            pistonHouseItems.push({ id: 'desm_vedacoes', text: descartaVedacoesA32X ? 'VEDAÇÕES: Cortar e DESCARTAR no lixo.' : 'VEDAÇÕES: PRESERVAR. Acomodar no saquinho.', highlight: descartaVedacoesA32X ? 'alert' : 'info' });
                        }

                        stepsData[1] = [
                            { id: 'mod_drenagem', title: isB777 ? 'Drenar Óleo' : 'Drenar Fluido Hidráulico', items: drenagemItems },
                            { id: 'mod_torque', title: 'Torque Tube', items: torqueTubeItems },
                            { id: 'mod_piston', title: 'Piston House', items: pistonHouseItems }
                        ];

                        stepsData[2] = [
                            { id: 'doc_mod', title: 'Formulários e Fitas', items: [
                                { id: 'doc_1', text: 'Repair Request: Fixar fita adesiva verde contendo o BARCODE e S/N.' },
                                { id: 'doc_2', text: 'Repair Request: Preencher "QSCMY63 - Oficina Limpeza Técnica".' },
                                { id: 'doc_7', text: 'Fechamento de Laudo: Aplicar carimbo da LATAM, data e rubrica.' },
                                { id: 'doc_8', text: 'DESPACHO FORMAL: Colher a assinatura física ou validação no terminal.', highlight: 'alert' }
                            ]}
                        ];

                        let despachoItems = [];
                        if (isB777) {
                            despachoItems.push({ id: 'fin_1_b', text: 'FLUXO MATERIAL: Movimentar os conjuntos laváveis para Limpeza Técnica 2.' });
                        } else {
                            despachoItems.push({ id: 'fin_1', text: isA321 ? 'FLUXO MATERIAL A321: Enviar apenas Piston House + Repair Request.' : 'FLUXO A320: Enviar conjunto completo para Limpeza.' });
                        }
                        despachoItems.push({ id: 'fin_4', text: 'BAIXA OPERACIONAL: Realizar a baixa técnica definitiva no Mysys.' });

                        stepsData[3] = [{ id: 'fin_mod', title: 'Destinos e Sistema', items: despachoItems }];

                    // ==========================================
                    // TRILHA 2: INSPEÇÃO (OVERHAUL)
                    // ==========================================
                    } else if (this.process === 'inspecao') {
                        
                        if (isOverhaul) {
                            // ETAPA 0: LIMPEZA PÓS-NDT
                            stepsData[0] = [
                                { id: 'insp_clean', title: 'Descontaminação Crítica', items: [
                                    { id: 'insp_c1', text: 'Banho Químico: Imergir Piston Housing, Torque Tube, Retaining Plate, Rear Plate, pinos e parafusos no fluido para remover resíduos do NDT.' },
                                    { id: 'insp_c2', text: 'Ação Mecânica: Solicitar o jato de limpeza, desobstruindo roscas e cavidades cegas.' },
                                    { id: 'insp_c3', text: 'SECAGEM (POKA-YOKE): Aplicar ar comprimido IMEDIATAMENTE no Torque Tube e peças de aço de liga. Prioridade absoluta para bloquear risco de oxidação.', highlight: 'alert' }
                                ]}
                            ];

                            // ETAPA 1: DIMENSIONAL (FRC Pag 9)
                            stepsData[1] = [
                                { id: 'insp_dim_piston', title: 'Piston Housing (2-380)', items: [
                                    { id: 'insp_d1', text: 'Ferramenta: Imicro 50-63mm.', highlight: 'info' },
                                    { id: 'insp_d2', text: 'Tolerância Máxima permitida: 50,846 mm.', highlight: 'alert' },
                                    { id: 'insp_d3', text: 'Medir as 14 cavidades (furos das canecas) e anotar os valores exatos nas colunas 1 a 14 da seção "Measured value" na Pág 9 do FRC.' }
                                ]},
                                { id: 'insp_dim_torque', title: 'Torque Tube (1-310)', items: [
                                    { id: 'insp_d4', text: 'Ferramenta: Micrômetro interno apropriado.', highlight: 'info' },
                                    { id: 'insp_d5', text: 'Tolerância exigida: 22,00 a 22,021 mm.', highlight: 'alert' },
                                    { id: 'insp_d6', text: 'Medir os 9 furos de alojamento dos pinos e anotar os valores exatos nas colunas 1 a 9 da Pág 9.' }
                                ]},
                                { id: 'insp_dim_pinos', title: 'Pinos (1-370)', items: [
                                    { id: 'insp_d7', text: 'Ferramenta: Micrômetro externo de precisão.', highlight: 'info' },
                                    { id: 'insp_d8', text: 'Tolerância exigida: 22,041 a 22,054 mm.', highlight: 'alert' },
                                    { id: 'insp_d9', text: 'Medir os 9 pinos de torque e anotar os valores exatos nas colunas 1 a 9 da Pág 9.' }
                                ]}
                            ];

                            // ETAPA 2: NDT E FRC
                            stepsData[2] = [
                                { id: 'insp_ndt', title: 'Auditoria de Laudos', items: [
                                    { id: 'insp_n1', text: 'Posicionar o Laudo NDT (Ex: W3558/26) lado a lado com as Páginas 3 e 6 do formulário FRC.' },
                                    { id: 'insp_n2', text: 'Buscar a peça no NDT. Se o "Result" constar "A" (Approved) ou "R" (Rejected), marque com "X" a respectiva coluna "Approved? Yes/No" no FRC.' },
                                    { id: 'insp_n3', text: 'CHANCELA OFICIAL: Imediatamente após assinalar, aplique no campo "Performed by" o Carimbo LATAM, a Data corrente e a Rubrica.', highlight: 'alert' },
                                    { id: 'insp_n4', text: 'Atenção: Assine ESTRITAMENTE as linhas referentes à validação do NDT. Não sobrescreva as inspeções visuais realizadas por outros inspetores.', highlight: 'info' }
                                ]}
                            ];

                            // ETAPA 3: RED TAG (MÓDULO CUSTOMIZADO)
                            stepsData[3] = [
                                { id: 'insp_redtag', title: 'Emissão de Material Condenado', items: [
                                    { id: 'rt_ui', type: 'red_tag_ui' },
                                    { id: 'rt_confirm', text: 'Confirmo a avaliação de material condenado nesta OS.', highlight: 'info' }
                                ]}
                            ];

                            // ETAPA 4: PINTURA E OSR (MÓDULO CUSTOMIZADO)
                            stepsData[4] = [
                                { id: 'insp_jateamento', title: 'Jateamento Prévio', items: [
                                    { id: 'osr_j1', text: 'Vá até o Armário 1 e pegue o gabarito de jateamento do freio.' },
                                    { id: 'osr_j2', text: 'Instale o gabarito protegendo as roscas dos furos do Torque tube.' },
                                    { id: 'osr_j3', text: 'POKA-YOKE: As únicas peças autorizadas para jateamento são o Torque tube e a Retaining plate!', highlight: 'alert' },
                                    { id: 'osr_j4', text: 'Execute o jateamento abrasivo das peças aprovadas.' }
                                ]},
                                { id: 'insp_osr', title: 'Abertura MROSYS & Repair Request', items: [
                                    { id: 'osr_ui', type: 'osr_ui' },
                                    { id: 'osr_confirm', text: 'Confirmo o envio das peças jateadas e a correta emissão da OSR para Pintura.', highlight: 'info' }
                                ]}
                            ];

                            // ETAPA 5: FECHAMENTO (MÓDULO CUSTOMIZADO)
                            stepsData[5] = [
                                { id: 'insp_fechamento', title: 'Fechamento da Capa do FRC', items: [
                                    { id: 'close_ui', type: 'fechamento_ui' },
                                    { id: 'close_f1', text: 'Marque a caixa de seleção "Findings" na folha do FRC se houver reprovação.' },
                                    { id: 'close_f2', text: 'Aplique o Carimbo Oficial LATAM na capa do processo.' },
                                    { id: 'close_f3', text: 'Assine, rubrique e insira a data corrente ao lado da justificativa técnica.' },
                                    { id: 'close_confirm', text: 'Auditoria técnica concluída e validada.', highlight: 'alert' }
                                ]}
                            ];

                        } else {
                            stepsData[0] = [{ id: 'insp_na', title: 'Procedimento Indisponível', items: [
                                { id: 'insp_na1', text: 'Atenção: A inspeção guiada está configurada apenas para o 4º Ciclo (Overhaul).', highlight: 'alert' }
                            ]}];
                        }
                    }

                    return stepsData[this.step] || [];
                }
            }));
        });
    </script>
</head>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 pb-6 shadow-2xl z-20">
            <div class="max-w-md mx-auto flex justify-between gap-4">
                <button @click="step = Math.max(0, step - 1)" :disabled="step === 0" :class="step === 0 ? 'bg-gray-50 text-gray-300 border border-gray-100' : 'bg-gray-100 text-gray-600 hover:bg-gray-200 transform active:scale-95'" class="flex-1 py-4 px-4 rounded-2xl font-bold text-sm transition-all">
                    Voltar
                </button>
                <button x-show="step < currentStepNames.length - 1" @click="step = Math.min(currentStepNames.length - 1, step + 1)" :class="isStepComplete() ? 'bg-blue-900 text-white hover:bg-blue-800 shadow-lg transform active:scale-95' : 'bg-blue-50 text-blue-300 border border-blue-100'" class="flex-none w-2/3 py-4 px-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 transition-all">
                    Avançar Etapa
                </button>
                <button x-show="step === currentStepNames.length - 1" @click="finishApp()" :class="isStepComplete() ? 'bg-green-500 text-white shadow-lg transform active:scale-95' : 'bg-green-50 text-green-200 border border-green-100'" class="flex-none w-2/3 py-4 px-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 transition-all">
                    Finalizar OS 
                </button>
            </div>
        </div>
    </div>

    <div x-show="screen === 'module'" x-cloak class="min-h-screen flex flex-col w-full max-w-md mx-auto bg-gray-50 relative shadow-2xl">
        <div class="bg-white p-4 pt-6 shadow-sm sticky top-0 z-20 border-b border-gray-200">
            <div class="flex items-center gap-4">
                <button @click="closeModule()" class="p-2 bg-gray-100 text-gray-600 rounded-full hover:bg-gray-200 transition transform active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <div>
                    <p class="text-xs font-bold text-blue-600 uppercase tracking-widest" x-text="currentStepNames[step]"></p>
                    <h2 class="text-lg font-black text-gray-800 leading-tight" x-text="activeModule?.title || ''"></h2>
                </div>
            </div>
        </div>

        <div class="flex-1 p-4 pb-32 overflow-y-auto space-y-4">
            <template x-for="item in (activeModule?.items || [])" :key="item.id">
                <div>
                    
                    <template x-if="!item.type || item.type === 'checkbox'">
                        <div :class="checked[item.id] ? 'bg-green-50 border-green-500 transform scale-95 opacity-75' : (item.highlight === 'alert' ? 'bg-orange-50 bg-opacity-80 border-orange-300 shadow-sm' : (item.highlight === 'info' ? 'bg-blue-50 bg-opacity-80 border-blue-300 shadow-sm' : 'bg-white border-gray-200 shadow-sm'))"
                             class="p-4 rounded-xl border-2 flex gap-4 items-start transition-all duration-200">
                            
                            <div @click="toggleCheck(item.id)" :class="checked[item.id] ? 'bg-green-500 border-green-500' : 'border-gray-300 bg-gray-50'" class="mt-0.5 flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center border-2 transition-colors cursor-pointer">
                                <svg x-show="checked[item.id]" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m20 6-11 11-5-5"/></svg>
                            </div>

                            <div class="flex-1 pt-0.5 flex flex-col gap-2">
                                <p :class="checked[item.id] ? 'text-gray-500 line-through' : 'text-gray-800 font-semibold'" class="text-sm leading-snug">
                                    <span x-text="item.text"></span>
                                </p>
                                <div class="flex flex-wrap items-center gap-2 mt-1">
                                    <template x-if="item.reference">
                                        <button @click="openModalImage(item.reference)" class="flex-1 inline-flex justify-center px-3 py-2 bg-blue-50 text-blue-700 hover:bg-blue-100 border border-blue-200 rounded-lg text-xs font-bold uppercase transition-colors">Ver Ref.</button>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>

                    <template x-if="item.type === 'red_tag_ui'">
                        <div class="space-y-4">
                            <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-800">
                                <strong>Atenção:</strong> Se houver itens reprovados na metrologia ou NDT, configure-os abaixo para alimentar o FRC.
                            </div>
                            <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm space-y-4">
                                <label class="block text-sm font-bold text-gray-700">Houve peça condenada neste processo?</label>
                                <div class="grid grid-cols-2 gap-3">
                                    <button @click="hasCondemned = true; generateSentence()" :class="hasCondemned ? 'bg-red-500 text-white border-red-500' : 'bg-gray-50 text-gray-700 border-gray-200'" class="py-2.5 rounded-lg font-bold text-sm border transition">SIM</button>
                                    <button @click="hasCondemned = false; clearCondemned()" :class="!hasCondemned ? 'bg-slate-700 text-white border-slate-700' : 'bg-gray-50 text-gray-700 border-gray-200'" class="py-2.5 rounded-lg font-bold text-sm border transition">NÃO</button>
                                </div>
                            </div>
                            <div x-show="hasCondemned" x-transition class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm space-y-4">
                                <p class="text-sm font-bold text-gray-700">Selecione as Peças Condenadas:</p>
                                <div class="space-y-2">
                                    <label class="flex items-center space-x-3 p-2 hover:bg-gray-50 rounded-lg cursor-pointer">
                                        <input type="checkbox" value="Piston house (2-380)" x-model="selectedPieces" @change="generateSentence()" class="h-4 w-4 text-red-500 border-gray-300 rounded">
                                        <span class="text-sm font-medium">Piston house (2-380)</span>
                                    </label>
                                    <label class="flex items-center space-x-3 p-2 hover:bg-gray-50 rounded-lg cursor-pointer">
                                        <input type="checkbox" value="Retaining Plate (1-60A)" x-model="selectedPieces" @change="generateSentence()" class="h-4 w-4 text-red-500 border-gray-300 rounded">
                                        <span class="text-sm font-medium">Retaining Plate (1-60A)</span>
                                    </label>
                                    <label class="flex items-center space-x-3 p-2 hover:bg-gray-50 rounded-lg cursor-pointer">
                                        <input type="checkbox" value="Rear Plate (1-80A)" x-model="selectedPieces" @change="generateSentence()" class="h-4 w-4 text-red-500 border-gray-300 rounded">
                                        <span class="text-sm font-medium">Rear Plate (1-80A)</span>
                                    </label>
                                </div>
                                <div class="pt-2 border-t border-gray-100">
                                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Adicionar Outra (Ex: Heat sink)</label>
                                    <div class="flex gap-2">
                                        <input type="text" x-model="customPiece" placeholder="Nome/Código" class="flex-grow border border-gray-300 rounded-lg px-3 py-1.5 text-sm">
                                        <button @click="addCustomPiece()" class="bg-slate-800 hover:bg-slate-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold">Inserir</button>
                                    </div>
                                </div>
                                <div class="pt-2 border-t border-gray-100 space-y-2">
                                    <p class="text-sm font-bold text-gray-700">Motivo da reprovação?</p>
                                    <div class="space-y-2">
                                        <label class="flex items-center space-x-3 p-2 bg-gray-50 rounded-lg cursor-pointer">
                                            <input type="radio" name="reason" value="dimensional check" x-model="condemnedReason" @change="generateSentence()" class="text-red-500">
                                            <span class="text-sm font-medium">Dimensional Check</span>
                                        </label>
                                        <label class="flex items-center space-x-3 p-2 bg-gray-50 rounded-lg cursor-pointer">
                                            <input type="radio" name="reason" value="NDT inspection due to crack" x-model="condemnedReason" @change="generateSentence()" class="text-red-500">
                                            <span class="text-sm font-medium">NDT Inspection (Trinca)</span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <template x-if="item.type === 'osr_ui'">
                        <div class="space-y-4">
                            <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm space-y-4">
                                <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                                    <h2 class="font-bold text-slate-800 text-sm">Dados da OSR MROSYS</h2>
                                    <button @click="fillOidExample()" class="text-[10px] bg-cyan-100 text-cyan-700 font-bold px-2 py-1 rounded">Gerar Exemplo</button>
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div>
                                        <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Tally Barcode</label>
                                        <input type="text" x-model="tallyBarcode" placeholder="Ex: T00X5" class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm uppercase">
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">S/N do Conjunto</label>
                                        <input type="text" x-model="snPiece" placeholder="Ex: 09360" class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm uppercase">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Identification Plate</label>
                                    <input type="text" x-model="idPlate" placeholder="Ex: 09" class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm uppercase">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Motivo Remoção (Copiar para MROSYS)</label>
                                    <textarea readonly class="w-full bg-slate-900 text-emerald-400 font-mono text-[11px] p-2.5 rounded-lg h-20 focus:outline-none" x-text="buildRemovalReason()"></textarea>
                                </div>
                            </div>
                            
                            <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm space-y-2">
                                <h2 class="font-bold text-slate-800 text-sm border-b border-gray-100 pb-2">Preenchimento Repair Request Físico</h2>
                                <div class="p-3 bg-slate-50 rounded-lg border border-gray-200 space-y-1">
                                    <p class="font-mono text-xs font-bold text-slate-800">QSCMY62 - OFICINA PINTURA</p>
                                    <p class="font-mono text-xs font-bold text-slate-800" x-text="'PERFORM THE PAINTING ' + getCMMRef()"></p>
                                    <p class="font-mono text-xs font-bold text-slate-800" x-text="'IDENTIFICATION PLATE: ' + (idPlate || '[Número]')"></p>
                                </div>
                            </div>
                        </div>
                    </template>

                    <template x-if="item.type === 'fechamento_ui'">
                        <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm space-y-3">
                            <span class="block text-xs font-bold text-gray-500 uppercase">Seção "Progressive Inspection / Findings"</span>
                            <template x-if="!hasCondemned">
                                <div class="p-4 bg-green-50 border border-green-200 rounded-xl text-sm text-green-800">
                                    ✨ Nenhuma peça foi condenada. Proceder com o encerramento regular da auditoria.
                                </div>
                            </template>
                            <template x-if="hasCondemned">
                                <div class="space-y-2">
                                    <div class="p-3 bg-blue-50 border border-blue-200 rounded-xl">
                                        <span class="block text-xs font-bold text-blue-600 uppercase mb-1">Texto a ser copiado (Editável):</span>
                                        <textarea x-model="findingsSentence" class="w-full bg-white border border-blue-300 rounded-lg p-2 text-sm font-medium text-slate-800 focus:outline-none h-20"></textarea>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                </div>
            </template>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 pb-6 shadow-2xl z-20">
            <div class="max-w-md mx-auto">
                <button @click="closeModule()" :class="isModuleComplete(activeModule) ? 'bg-blue-900 text-white hover:bg-blue-800 shadow-lg' : 'bg-gray-200 text-gray-700'" class="w-full py-4 px-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 transition-all transform active:scale-95">
                    <span x-text="isModuleComplete(activeModule) ? 'Módulo Concluído - Voltar' : 'Voltar para Lista'"></span>
                </button>
            </div>
        </div>
    </div>

    <div x-show="modalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" style="background-color: rgba(15, 23, 42, 0.8);" @click.self="closeModalImage()">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl flex flex-col" style="max-height: 85vh;">
            <div class="bg-gray-900 text-white p-4 flex justify-between items-center">
                <span class="font-extrabold text-xs uppercase text-gray-300">Apoio Visual / Tool</span>
                <button @click="closeModalImage()" class="p-1 text-gray-400 hover:text-white rounded-full bg-gray-800 transition">X</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 bg-gray-100 flex items-center justify-center">
                <img :src="modalData.imgUrl" class="max-w-full rounded-xl shadow-md border border-gray-200 bg-white" alt="Ref">
            </div>
        </div>
    </div>

</body>
</html>
