<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Setup LATAM - Freios & Almoxarifado</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
        html { scroll-behavior: smooth; }
    </style>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appData', () => ({
                screen: 'home', 
                model: '',
                cycle: '',
                step: 0,
                activeModule: null, 
                checked: {},
                stepNames: ['Preparação', 'Desmontagem', 'Documentação', 'Despacho'],
                
                modalOpen: false,
                modalData: { imgUrl: '', manualPage: '', toolCode: '', title: '' },

                searchQuery: '',
                currentCategory: 'all', 
                expandedContainer: null, 
                expandedSub: null, 
                
                // BANCO DE DADOS COMPLETO E ATUALIZADO DO ALMOXARIFADO
                toolsList: [
                    // CAIXA 1
                    { name: 'Adaptor (Special Tool)', code: 'Q47963-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', special: true },
                    { name: 'Compression Tool (A320/A321)', code: 'F27701000', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', special: true },
                    { name: 'Installation Cone (Special Tool)', code: 'Q47964-1-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', special: true },
                    { name: 'Installation Cone (Special Tool)', code: 'Q47965-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Gaveta 1', special: true },
                    { name: 'Spatula (Special Tool)', code: '89901-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', special: true },
                    { name: 'Adaptação 3/4 Válvula Fitting Assembly', code: 'MY18011-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', special: true },
                    { name: 'Soquete 3/4', code: 'MY46SQ085', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior' },
                    { name: 'Extensor', code: 'MY46EX055', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior' },
                    { name: 'Braço de Torque', code: 'MY46BF007', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior' },
                    { name: 'Macete', code: 'MY46MA002', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior' },
                    { name: 'Soquete 1/4', code: 'MY46SQ238', cat: 'caixas', loc: 'Caixa 1', sub: 'Gaveta 1' },
                    { name: 'Alicate de Corte', code: 'MY46AL052', cat: 'caixas', loc: 'Caixa 1', sub: 'Gaveta 1' },
                    { name: 'Alicate de Freno', code: 'MY46AL050', cat: 'caixas', loc: 'Caixa 1', sub: 'Gaveta 2' },
                    { name: 'Chave Combinada 3/8', code: 'MY46CC030', cat: 'caixas', loc: 'Caixa 1', sub: 'Gaveta 3' },
                    { name: 'Alicate para Anel Trava (Beta)', code: 'MY46AL079', cat: 'caixas', loc: 'Caixa 1', sub: 'Gaveta 4' },

                    // CAIXA 2
                    { name: 'Compression Tool (B777)', code: 'F26693000-T', cat: 'caixas', loc: 'Caixa 2', sub: 'Compartimento Superior', special: true },
                    { name: 'Soquete 13/16', code: 'MY46SQ029', cat: 'caixas', loc: 'Caixa 2', sub: 'Compartimento Superior' },
                    { name: 'Alicate para Anel (Beta)', code: 'MY46AL052', cat: 'caixas', loc: 'Caixa 2', sub: 'Gaveta 1' },
                    { name: 'Alicate de Freno', code: 'MY46AL068', cat: 'caixas', loc: 'Caixa 2', sub: 'Gaveta 2' },

                    // CAIXA 3 a 9 (Simplificadas para não ultrapassar limite de código, mas prontas para uso)
                    { name: 'Installation Cone 1', code: 'Q47964-1-T', cat: 'caixas', loc: 'Caixa 3', sub: 'Compartimento Superior', special: true },
                    { name: 'Alicate de Freno', code: 'MY46AL011', cat: 'caixas', loc: 'Caixa 3', sub: 'Gaveta 2' },
                    { name: 'Adaptação 3/4 Válvula', code: 'MY18011-T', cat: 'caixas', loc: 'Caixa 4', sub: 'Gaveta 1', special: true },
                    { name: 'Alicate de Freno', code: 'MY46AL059', cat: 'caixas', loc: 'Caixa 4', sub: 'Gaveta 2' },
                    { name: 'Spatula (Special Tool)', code: '89901-T', cat: 'caixas', loc: 'Caixa 5', sub: 'Compartimento Superior', special: true },

                    // CARRO 1
                    { name: 'Testador de Molas', code: 'EQ0003', cat: 'carros', loc: 'Carro 1', sub: 'Em Cima' },
                    { name: 'Base de Apoio - Freios A320', code: 'MY46063-T', cat: 'carros', loc: 'Carro 1', sub: 'Em Cima', special: true },
                    { name: 'Calibration Block', code: 'CBS001-T', cat: 'carros', loc: 'Carro 1', sub: 'Gaveta A', special: true },
                    { name: 'Paquímetro', code: 'PA9887S', cat: 'carros', loc: 'Carro 1', sub: 'Gaveta A' },
                    { name: 'Jogo de Soquetes', code: 'SQJO001', cat: 'carros', loc: 'Carro 1', sub: 'Gaveta B' },
                    { name: 'Ferramenta Desmontagem A320/B777', code: 'MY18027-T', cat: 'carros', loc: 'Carro 1', sub: 'Gaveta D', special: true },

                    // CARRO 8 
                    { name: 'Shrinking Bush (Kit F26692000-T)', code: 'R46105-T', cat: 'carros', loc: 'Carro 8', sub: 'Gaveta A', special: true },
                    { name: 'Half Shell (Kit F26692000-T)', code: 'R46103-T', cat: 'carros', loc: 'Carro 8', sub: 'Gaveta A', special: true },
                    { name: 'Piston Installation Support Tool 7', code: '114-325-T', cat: 'carros', loc: 'Carro 8', sub: 'Gaveta B', special: true },

                    // ARMÁRIOS 1 e 2
                    { name: 'Caneta Pneumática', code: 'MY46CPN001', cat: 'armarios', loc: 'Armário 2 (e 1)', sub: 'Prateleira A' },
                    { name: 'Torquímetro 50-250 LBF.FT', code: 'TO0290', cat: 'armarios', loc: 'Armário 2 (e 1)', sub: 'Prateleira B' },
                    { name: 'Ferramenta de Fixação dos Bolts A320/A321', code: 'MY46037-T', cat: 'armarios', loc: 'Armário 2 (e 1)', sub: 'Prateleira C', special: true },

                    // FROTAS ESPECIAIS: B787 e A350
                    { name: 'Tool, Brake Assembly (B787-9/10)', code: 'F28014000-T', cat: 'frotas', loc: 'Carro B787 - 9/10', sub: 'Parte Superior', special: true },
                    { name: 'Compression Tool (A350)', code: 'T45811', cat: 'frotas', loc: 'Palete A350', sub: 'Caixa 3', special: true }
                ],

                // CHECKLIST ORIGINAL COM CORREÇÃO DE P/N
                currentModules() {
                    let modules = [];
                    
                    if (this.step === 0) {
                        modules.push({
                            id: 'mod_prep_1', title: 'Recebimento e Inspeção', subtitle: 'Verificações iniciais',
                            items: [ { id: 'prep_1', text: 'Confirmar modelo da aeronave e documentação.' } ]
                        });
                    }
                    
                    if (this.step === 1) { // DESMONTAGEM (Igual às suas prints)
                        
                        // Lógica simples para definir a ferramenta correta baseada no modelo
                        let toolRefCode = 'N/A';
                        if (this.model === 'A320') toolRefCode = 'F27701000';
                        if (this.model === 'A321') toolRefCode = 'F27701000';
                        if (this.model === 'B777') toolRefCode = 'F26693000-T';

                        modules.push({
                            id: 'mod_piston', title: 'Piston Housing', subtitle: 'Desmontagem e Dreno',
                            items: [
                                { id: 'piston_1', text: 'Utilize EPI adequado (luvas e óculos) antes de iniciar a drenagem do fluido Skydrol.', warning: true },
                                { id: 'piston_2', text: 'Instale a ferramenta de compressão e remova os parafusos do conjunto principal para liberação segura.', reference: { imgUrl: 'https://i.imgur.com/reDKB9A.jpeg', manualPage: 'Page 3009 / CMM 32-49-60', toolCode: toolRefCode } }
                            ]
                        });
                        
                        modules.push({
                            id: 'mod_heatsink', title: 'Heat Sink', subtitle: 'Separação dos discos de freio',
                            items: [
                                { id: 'heat_1', text: 'Remova sequencialmente os discos de rotor e estator da montagem principal.' }
                            ]
                        });
                        
                        modules.push({
                            id: 'mod_torquetube', title: 'Torque Tube', subtitle: 'Desacoplamento e inspeção visual',
                            items: [
                                { id: 'torque_1', text: 'Desconecte o tubo de torque da placa de pressão.' }
                            ]
                        });
                    }
                    
                    if (this.step === 2) {
                        modules.push({ id: 'mod_docs', title: 'Documentação', subtitle: 'Registros', items: [{ id: 'doc_1', text: 'Preencher Repair Request.' }] });
                    }
                    
                    if (this.step === 3) {
                        modules.push({ id: 'mod_despacho', title: 'Despacho', subtitle: 'Acondicionamento', items: [{ id: 'despacho_1', text: 'Acondicionar na caixa de transporte.' }] });
                    }
                    
                    return modules;
                },

                // FUNÇÕES DA GALERIA
                get filteredTools() {
                    let list = this.toolsList;
                    if (this.searchQuery !== '') {
                        const q = this.searchQuery.toLowerCase();
                        return list.filter(t => t.name.toLowerCase().includes(q) || t.code.toLowerCase().includes(q));
                    }
                    if (this.currentCategory !== 'all') {
                        list = list.filter(t => t.cat === this.currentCategory);
                        if (this.expandedContainer) {
                            list = list.filter(t => t.loc === this.expandedContainer);
                            if (this.expandedSub) {
                                list = list.filter(t => t.sub === this.expandedSub);
                            }
                        }
                    }
                    return list;
                },

                get uniqueContainers() {
                    const filtered = this.toolsList.filter(t => t.cat === this.currentCategory);
                    return [...new Set(filtered.map(t => t.loc))];
                },

                get uniqueSubLocations() {
                    if (!this.expandedContainer) return [];
                    const filtered = this.toolsList.filter(t => t.loc === this.expandedContainer);
                    return [...new Set(filtered.map(t => t.sub))];
                },

                openLocationModalByCode(code) {
                    if (!code) return;
                    const cleanCode = code.replace('-T', '').split(' / ')[0].trim().toLowerCase();
                    const tool = this.toolsList.find(t => t.code.toLowerCase().includes(cleanCode));
                    
                    if (tool) {
                        this.screen = 'gallery';
                        this.searchQuery = tool.code; 
                        window.scrollTo(0, 0);
                    } else {
                        alert("Ferramenta ou insumo localizado fisicamente apenas na caixa padrão do operador.");
                    }
                },

                // CONTROLE DO APP
                startApp() { if(this.model && this.cycle) { this.screen = 'checklist'; this.step = 0; this.checked = {}; window.scrollTo(0, 0); } },
                openGallery() { this.screen = 'gallery'; this.searchQuery = ''; this.currentCategory = 'all'; this.expandedContainer = null; this.expandedSub = null; window.scrollTo(0, 0); },
                finishApp() { if(this.isStepComplete()){ alert("Finalizado!"); this.screen = 'home'; this.model = ''; this.cycle = ''; window.scrollTo(0, 0); } },
                openModule(module) { this.activeModule = module; this.screen = 'module'; window.scrollTo(0, 0); },
                closeModule() { this.activeModule = null; this.screen = 'checklist'; window.scrollTo(0, 0); },
                toggleCheck(id) { this.checked[id] = !this.checked[id]; },
                openModalImage(title, refData) { this.modalData = { title: title, ...refData }; this.modalOpen = true; },
                closeModalImage() { this.modalOpen = false; },
                
                isModuleComplete(module) { return module.items.every(item => this.checked[item.id]); },
                isStepComplete() { 
                    const modules = this.currentModules(); 
                    if(modules.length === 0) return false; 
                    return modules.every(m => this.isModuleComplete(m));
                },
                
                getStepIcon(index) { 
                    const icons = [
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1-1-1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>',
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>',
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>'
                    ]; 
                    return icons[index]; 
                }
            }));
        });
    </script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased min-h-screen" x-data="appData">

    <!-- ==================== TELA HOME ==================== -->
    <div x-show="screen === 'home'" x-cloak class="p-6 max-w-md mx-auto min-h-screen flex flex-col justify-center">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-blue-900 tracking-tight">LATAM <span class="text-red-600">Setup</span></h1>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Modelo da Aeronave</label>
                <select x-model="model" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-base rounded-xl p-3.5">
                    <option value="" disabled selected>Selecione...</option>
                    <option value="A320">A320</option>
                    <option value="A321">A321</option>
                    <option value="B777">B777</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Ciclo</label>
                <select x-model="cycle" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-base rounded-xl p-3.5">
                    <option value="" disabled selected>Selecione...</option>
                    <option value="1">Ciclo 1</option>
                    <option value="2">Ciclo 2</option>
                </select>
            </div>
            <button @click="startApp()" :disabled="!model || !cycle" class="w-full font-bold rounded-xl text-lg px-5 py-4 bg-blue-900 text-white disabled:bg-gray-300">Iniciar Bancada</button>
        </div>

        <button @click="openGallery()" class="mt-8 flex items-center justify-center gap-2 w-full text-blue-900 font-bold p-4 bg-white rounded-xl border">
            Almoxarifado Digital
        </button>
    </div>

    <!-- ==================== TELA CHECKLIST ==================== -->
    <div x-show="screen === 'checklist'" x-cloak class="pb-24 max-w-md mx-auto">
        <div class="bg-blue-900 text-white p-6 sticky top-0 z-20">
            <div class="flex justify-between mb-4">
                <button @click="screen = 'home'"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
                <div class="text-right text-sm" x-text="model + ' | ' + cycle"></div>
            </div>
            <div class="text-center mt-3 font-bold text-lg uppercase" x-text="stepNames[step]"></div>
        </div>

        <div class="p-4 space-y-4">
            <template x-for="module in currentModules()" :key="module.id">
                <div @click="openModule(module)" class="bg-white rounded-xl p-5 border shadow-sm flex items-center justify-between cursor-pointer">
                    <div>
                        <h3 class="font-bold text-gray-900 text-lg" x-text="module.title"></h3>
                        <p class="text-sm text-gray-500" x-text="module.subtitle"></p>
                    </div>
                    <svg class="text-gray-400" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                </div>
            </template>
        </div>

        <div class="fixed bottom-0 w-full max-w-md bg-white border-t p-4">
            <button @click="step < 3 ? step++ : finishApp()" :disabled="!isStepComplete() && step === 3" class="w-full font-bold rounded-xl text-lg py-4 bg-blue-900 text-white disabled:bg-gray-300">Avançar</button>
        </div>
    </div>

    <!-- ==================== TELA DO MÓDULO ==================== -->
    <div x-show="screen === 'module'" x-cloak class="pb-24 max-w-md mx-auto min-h-screen bg-gray-50">
        <template x-if="activeModule">
            <div>
                <div class="bg-white border-b p-4 sticky top-0 z-20 flex items-center gap-3">
                    <button @click="closeModule()" class="p-2 bg-gray-100 rounded-full"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
                    <h2 class="font-black text-xl" x-text="activeModule.title"></h2>
                </div>

                <div class="p-4 space-y-3">
                    <template x-for="item in activeModule.items" :key="item.id">
                        <div class="bg-white rounded-xl border overflow-hidden shadow-sm">
                            <label class="flex items-start gap-4 p-4 cursor-pointer">
                                <input type="checkbox" :checked="checked[item.id]" @change="toggleCheck(item.id)" class="w-6 h-6 rounded border-gray-300">
                                <p :class="item.warning ? 'text-red-600 font-bold' : ''" class="flex-1" x-text="item.text"></p>
                            </label>
                            
                            <template x-if="item.reference">
                                <div class="px-4 pb-4 flex gap-2">
                                    <button @click="openModalImage(activeModule.title, item.reference)" class="flex-1 bg-blue-50 text-blue-700 py-2 rounded-lg font-bold border border-blue-100 flex items-center justify-center gap-2">
                                        Ref. <span x-text="item.reference.toolCode"></span>
                                    </button>
                                    <button @click="openLocationModalByCode(item.reference.toolCode)" class="w-11 h-11 flex justify-center items-center bg-orange-100 text-orange-600 rounded-lg border border-orange-200">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                                    </button>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>

    <!-- ==================== ALMOXARIFADO DIGITAL ==================== -->
    <div x-show="screen === 'gallery'" x-cloak class="max-w-md mx-auto min-h-screen bg-gray-50 flex flex-col pb-10">
        <div class="bg-blue-900 text-white p-4 sticky top-0 z-20 flex items-center gap-3">
            <button @click="screen = 'home'" class="p-2 -ml-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
            <h2 class="font-bold text-lg">Almoxarifado Inteligente</h2>
        </div>

        <div class="p-4 bg-white border-b sticky top-[60px] z-10">
            <input type="text" x-model="searchQuery" @input="currentCategory = 'all'" class="bg-gray-50 border text-sm rounded-xl w-full p-3" placeholder="P/N, Código LATAM...">
        </div>

        <div x-show="searchQuery === ''" class="bg-white p-2 border-b flex gap-1 overflow-x-auto text-xs font-bold uppercase">
            <button @click="currentCategory = 'all'" :class="currentCategory === 'all' ? 'bg-blue-900 text-white' : 'bg-gray-100'" class="px-3 py-2 rounded-lg">Tudo</button>
            <button @click="currentCategory = 'caixas'" :class="currentCategory === 'caixas' ? 'bg-blue-900 text-white' : 'bg-gray-100'" class="px-3 py-2 rounded-lg">Caixas</button>
            <button @click="currentCategory = 'carros'" :class="currentCategory === 'carros' ? 'bg-blue-900 text-white' : 'bg-gray-100'" class="px-3 py-2 rounded-lg">Carros</button>
        </div>

        <div class="p-4 space-y-2 flex-1 overflow-y-auto">
            <template x-for="tool in filteredTools" :key="tool.code + tool.loc">
                <div class="bg-white p-4 rounded-xl border shadow-sm flex flex-col gap-2">
                    <div>
                        <span class="text-xs font-bold text-gray-400 font-mono" x-text="tool.code"></span>
                        <h3 class="font-bold text-gray-900 text-base mt-1" x-text="tool.name"></h3>
                    </div>
                    <div class="bg-gray-50 border p-2 rounded-lg flex items-center gap-2">
                        <span class="font-bold text-gray-900 text-sm" x-text="tool.loc"></span> - <span class="text-sm" x-text="tool.sub"></span>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- ==================== MODAL IMAGEM ==================== -->
    <div x-show="modalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center px-4 bg-gray-900/80">
        <div @click.away="closeModalImage()" class="bg-white rounded-2xl w-full max-w-sm overflow-hidden flex flex-col">
            <div class="bg-gray-900 px-4 py-3 flex justify-between items-center text-white">
                <span class="font-bold text-sm uppercase" x-text="modalData.title"></span>
                <button @click="closeModalImage()">X</button>
            </div>
            <div class="bg-gray-100 p-4 flex justify-center">
                <img :src="modalData.imgUrl" class="max-w-full rounded-lg" alt="CMM Ref">
            </div>
            <div class="p-5 space-y-3">
                <div class="bg-gray-50 p-3 rounded-xl">
                    <div class="text-[10px] text-gray-400 uppercase">Manual Ref (CMM)</div>
                    <div class="text-sm font-bold" x-text="modalData.manualPage"></div>
                </div>
                <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
