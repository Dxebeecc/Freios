<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Setup LATAM - Freios (Módulos)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        [x-cloak] { display: none !important; }
    </style>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appData', () => ({
                screen: 'home',
                model: null,
                cycle: null,
                step: 0,
                activeModule: null, 
                checked: {},
                stepNames: ['Preparação', 'Desmontagem', 'Documentação', 'Despacho'],
                
                modalOpen: false,
                modalData: { imgUrl: '', manualPage: '', toolCode: '' },

                // --- ESTADOS DA GALERIA ORGANIZADA POR PASTAS ---
                searchQuery: '',
                activeTab: 'all', // all, caixas, carros, armarios
                selectedContainer: null, // Guarda qual Carro ou Caixa foi clicado
                selectedSub: null, // Guarda qual Gaveta ou Prateleira foi clicada
                
                // BANCO DE DADOS MAPEADO COM LOCALIZAÇÕES EXATAS (Poka-Yoke)
                toolsList: [
                    // CAIXA 1
                    { name: 'Adaptor (Special Tool)', code: 'Q47963-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', image: 'https://i.imgur.com/UOUvSSN.jpeg', special: true },
                    { name: 'Compression Tool (A320)', code: 'F26693000-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', image: 'https://i.imgur.com/reDKB9A.jpeg', special: true },
                    { name: 'Installation Cone 1', code: 'Q47964-1-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', image: '' },
                    { name: 'Installation Cone 2', code: 'Q47965-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Gaveta 1', image: '' },
                    { name: 'Spatula (Espátula)', code: '89901-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', image: '' },
                    { name: 'Adaptação 3/4 Válvula Fitting Assembly', code: 'MY18011-T', cat: 'caixas', loc: 'Caixa 1', sub: 'Compartimento Superior', image: '' },

                    // CAIXA 2
                    { name: 'Adaptor (Special Tool)', code: 'Q47963-T', cat: 'caixas', loc: 'Caixa 2', sub: 'Compartimento Superior', image: 'https://i.imgur.com/UOUvSSN.jpeg', special: true },
                    { name: 'Compression Tool', code: 'F26693000-T', cat: 'caixas', loc: 'Caixa 2', sub: 'Compartimento Superior', image: 'https://i.imgur.com/reDKB9A.jpeg', special: true },
                    { name: 'Spatula (Espátula)', code: '89901-T', cat: 'caixas', loc: 'Caixa 2', sub: 'Compartimento Superior', image: '' },

                    // CARRO 1
                    { name: 'Testador de Molas', code: 'EQ0003', cat: 'carros', loc: 'Carro 1', sub: 'Parte Superior', image: '' },
                    { name: 'Base de Apoio - Freios A320', code: 'MY46063-T', cat: 'carros', loc: 'Carro 1', sub: 'Parte Superior', image: '', special: true },
                    { name: 'Calibration Block', code: 'CBS001-T', cat: 'carros', loc: 'Carro 1', sub: 'Gaveta A', image: '' },
                    { name: 'Ferramenta Desmontagem A320/B777', code: 'MY18027-T', cat: 'carros', loc: 'Carro 1', sub: 'Gaveta D', image: '', special: true },

                    // CARRO 2
                    { name: 'Spanner (Canecas B777)', code: 'R47166', cat: 'carros', loc: 'Carro 2', sub: 'Gaveta A', image: 'https://i.imgur.com/w9Fjg8u.jpeg' },

                    // CARRO 8
                    { name: 'Shrinking Bush (Kit F26692000-T)', code: 'R46105-T', cat: 'carros', loc: 'Carro 8', sub: 'Gaveta A', image: '', special: true },
                    { name: 'Piston Installation Support Tool 7', code: '114-325-T', cat: 'carros', loc: 'Carro 8', sub: 'Gaveta B', image: '', special: true },
                    { name: 'Spring Removal/Install (B777)', code: 'R47163', cat: 'carros', loc: 'Carro 8', sub: 'Gaveta E', image: 'https://i.imgur.com/n85AF4P.jpeg', special: true },

                    // ARMÁRIOS 1 E 2
                    { name: 'Caneta Pneumática', code: 'MY46CPN001', cat: 'armarios', loc: 'Armário 2', sub: 'Prateleira A', image: '' },
                    { name: 'Torquímetro 50-250 LBF.FT', code: 'TO0290', cat: 'armarios', loc: 'Armário 2', sub: 'Prateleira B', image: '' },
                    { name: 'Ferramenta de Fixação dos Bolts A320/A321', code: 'MY46037-T', cat: 'armarios', loc: 'Armário 2', sub: 'Prateleira C', image: '', special: true }
                ],

                // Filtro Dinâmico da Galeria (Pastas vs Busca Directa)
                get filteredTools() {
                    let list = this.toolsList;
                    if (this.searchQuery !== '') {
                        const q = this.searchQuery.toLowerCase();
                        return list.filter(t => t.name.toLowerCase().includes(q) || t.code.toLowerCase().includes(q));
                    }
                    if (this.activeTab !== 'all') {
                        list = list.filter(t => t.cat === this.activeTab);
                        if (this.selectedContainer) {
                            list = list.filter(t => t.loc === this.selectedContainer);
                            if (this.selectedSub) {
                                list = list.filter(t => t.sub === this.selectedSub);
                            }
                        }
                    }
                    return list;
                },

                get uniqueContainers() {
                    const filtered = this.toolsList.filter(t => t.cat === this.activeTab);
                    return [...new Set(filtered.map(t => t.loc))];
                },

                get uniqueSubLocations() {
                    if (!this.selectedContainer) return [];
                    const filtered = this.toolsList.filter(t => t.loc === this.selectedContainer);
                    return [...new Set(filtered.map(t => t.sub))];
                },
                
                // Retorna à Galeria filtrando direto pelo clique do botão laranja no checklist
                openLocationModalByCode(code) {
                    if(!code) return;
                    const cleanCode = code.replace('-T', '').split(' / ')[0].trim().toLowerCase();
                    const tool = this.toolsList.find(t => t.code.toLowerCase().includes(cleanCode));
                    if (tool) {
                        this.screen = 'gallery';
                        this.searchQuery = tool.code;
                        window.scrollTo(0, 0);
                    }
                },

                startApp() {
                    if(this.model && this.cycle) {
                        this.screen = 'checklist';
                        this.step = 0;
                        this.checked = {};
                        window.scrollTo(0, 0);
                    }
                },

                openGallery() {
                    this.screen = 'gallery';
                    this.searchQuery = '';
                    this.activeTab = 'all';
                    this.selectedContainer = null;
                    this.selectedSub = null;
                    window.scrollTo(0, 0);
                },

                finishApp() {
                    if(this.isStepComplete()){
                        alert("Bancada finalizada com sucesso! Todas as etapas concluídas.");
                        this.screen = 'home';
                        this.model = null;
                        this.cycle = null;
                        window.scrollTo(0, 0);
                    }
                },

                openModule(module) {
                    this.activeModule = module;
                    this.screen = 'module';
                    window.scrollTo(0, 0);
                },

                closeModule() {
                    this.activeModule = null;
                    this.screen = 'checklist';
                    window.scrollTo(0, 0);
                },

                toggleCheck(id) { this.checked[id] = !this.checked[id]; },
                openModalImage(refData) { this.modalData = refData; this.modalOpen = true; },
                closeModalImage() { this.modalOpen = false; },
                isModuleComplete(module) { return module?.items?.every(item => this.checked[item.id]) || false; },

                isStepComplete() {
                    const modules = this.currentModules();
                    if(!modules || modules.length === 0) return false;
                    return modules.every(m => this.isModuleComplete(m));
                },

                getStepIcon(index) {
                    const icons = [
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1-1-1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>',
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>',
                        '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>'
                    ];
                    return icons[index];
                },

                currentModules() {
                    if (!this.model || !this.cycle) return [];
                    const isA321 = this.model === 'A321';
                    const isB777 = this.model === 'B777';
                    const isOverhaul = this.cycle === 4;
                    const descartaVedacoesA32X = isA321 ? true : (this.cycle === 2 || this.cycle === 4);

                    let stepsData = [];

                    // --- ETAPA 0: PREPARAÇÃO ---
                    stepsData[0] = [{
                        id: 'prep_mod', title: 'Preparação de Sistema',
                        items: [
                            { id: 'prep_1', text: 'Iniciar a OS no sistema Mysys e imprimir a capa.' },
                            { id: 'prep_2', text: 'Atualizar Planilha de Movimentação para o status "Bancada 1".' }
                        ]
                    }];

                    // --- ETAPA 1: DESMONTAGEM ---
                    let drenagemItems = [];
                    if (isB777) {
                        drenagemItems.push({ id: 'dren_b1', text: 'AVISO: Usar proteção (pele e olhos). O fluido hidráulico é inflamável e perigoso.', highlight: 'alert' });
                        drenagemItems.push({ id: 'dren_b2', text: 'Desapertar e remover o parafuso (1-350) e a anilha de sangria (1-360).' });
                        drenagemItems.push({ id: 'dren_b3', text: 'Conectar a mangueira de dreno (ponta fina) e abaixar as canelas dos 6 pistões.', highlight: 'info', reference: isOverhaul ? { btnText: 'Ref. Conexão', imgUrl: 'https://i.imgur.com/oXx3aU6.jpeg', manualPage: 'CMM B777', toolCode: 'Conexão Hidráulica' } : null });
                        drenagemItems.push({ id: 'dren_b4', text: 'Após drenar, apertar o parafuso de sangria com torque de 6,8 N.m.', highlight: 'alert' });
                    } else {
                        drenagemItems.push({ id: 'dren_a1', text: 'AVISO: Usar equipamento de proteção (EPI) para pele e olhos.', highlight: 'alert' });
                        drenagemItems.push({ id: 'dren_a2', text: 'Conectar a mangueira de dreno na conexão/válvula de sangria.' });
                        drenagemItems.push({ id: 'dren_a3', text: 'Empurrar os pistões para baixo para esvaziar o fluido de dentro do Piston House.' });
                        drenagemItems.push({ id: 'dren_a4', text: 'DICA TÉCNICA: Cada conexão de dreno está ligada a uma galeria de apenas 7 pistões. Obrigatoriamente trocar a válvula.', highlight: 'info' });
                    }

                    let torqueTubeItems = [];
                    if (isB777) {
                        torqueTubeItems.push({ id: 'tt_b1', text: isOverhaul ? 'OVERHAUL: Não há desmontagem no Torque Tube. Enviar ao NDT.' : 'Torque Tube: Nenhuma ação de desmontagem requerida.' });
                    } else {
                        torqueTubeItems.push({ id: 'desm_1', text: isA321 ? 'Atenção A321: Separar e fixar na bancada SOMENTE o Piston House.' : 'Atenção A320/NEO: Posicionar Torque Tube e Piston House alinhados na horizontal.', highlight: 'info' });
                        torqueTubeItems.push({ id: 'desm_2', text: 'Ferramenta: Usar Soquete 5/16" com extensor longo.' });
                        if (isOverhaul) torqueTubeItems.push({ id: 'desm_8', text: 'OVERHAUL: Levar Torque Tube à prensa hidráulica para remoção segura dos pinos.', highlight: 'alert' });
                    }

                    let pistonHouseItems = [];
                    if (isB777) {
                        pistonHouseItems.push({ id: 'ph_b_insulator', text: 'Remover o "insulator assembly" usando a ferramenta F27701000.', reference: { btnText: 'Ref. Tool F27701000', imgUrl: 'https://i.imgur.com/reDKB9A.jpeg', manualPage: 'Page 3009', toolCode: 'Tool F27701000' } });
                        pistonHouseItems.push({ id: 'ph_b_sleeve', text: 'Desrosquear canecas utilizando a ferramenta especial R47166.', reference: { btnText: 'Ref. Tool R47166', imgUrl: 'https://i.imgur.com/w9Fjg8u.jpeg', manualPage: 'Page 3009', toolCode: 'Tool R47166' } });
                        pistonHouseItems.push({ id: 'ph_b_spring', text: 'Levar à prensa. Utilizar a ferramenta R47163 e remover o retaining ring.', reference: { btnText: 'Ref. Ferramentas', imgUrl: 'https://i.imgur.com/n85AF4P.jpeg', manualPage: 'Page 3010', toolCode: 'Tool R47163' } });
                    } else {
                        pistonHouseItems.push({ id: 'desm_sleeve_a32x', text: 'Desrosquear e remover as canecas utilizando o Adaptador (Q47963).', reference: { btnText: 'Ref. Q47963', imgUrl: 'https://i.imgur.com/UOUvSSN.jpeg', manualPage: 'CMM Page 3010', toolCode: 'Q47963' }, reference2: { btnText: 'Ref. Caneca', imgUrl: 'https://i.imgur.com/EWLk3BW.jpeg', manualPage: 'Item 110', toolCode: 'Piston Sleeve' } });
                        pistonHouseItems.push({ id: 'desm_pistao_a32x', text: 'Remover o pistão e descartar a vedação externa.', reference: { btnText: 'Ref. Vedação', imgUrl: 'https://i.imgur.com/mvo5WSk.jpeg', manualPage: 'CMM Ref', toolCode: 'Vedação Pistão' } });
                        pistonHouseItems.push({ id: 'desm_vedacoes', text: descartaVedacoesA32X ? 'VEDAÇÕES GRANDES: Cortar e DESCARTAR no lixo.' : 'VEDAÇÕES GRANDES: PRESERVAR no saquinho com fita verde.', highlight: descartaVedacoesA32X ? 'alert' : 'info' });
                    }

                    stepsData[1] = [
                        { id: 'mod_drenagem', title: isB777 ? 'Drenar Óleo' : 'Drenar Fluido Hidráulico', items: drenagemItems },
                        { id: 'mod_torque', title: 'Torque Tube', items: torqueTubeItems },
                        { id: 'mod_piston', title: 'Piston House', items: pistonHouseItems }
                    ];

                    // --- ETAPA 2: DOCUMENTAÇÃO ---
                    stepsData[2] = [{
                        id: 'doc_mod', title: 'Formulários e Fitas',
                        items: [
                            { id: 'doc_1', text: 'Repair Request: Fixar fita adesiva verde com o BARCODE.', reference: { btnText: 'Ref. Fita Verde', imgUrl: 'https://i.imgur.com/mrgzFdp.jpeg', manualPage: 'Interno', toolCode: 'Fita Verde' } },
                            { id: 'doc_5', text: `Restoration Form: Informar com precisão o NUMBER of cycles (${this.cycle}).`, reference: { btnText: 'Ref. CRF', imgUrl: 'https://i.imgur.com/7I1oMwT.jpeg', manualPage: 'Interno', toolCode: 'Restoration Form' } }
                        ]
                    }];

                    // --- ETAPA 3: DESPACHO ---
                    stepsData[3] = [{ id: 'fin_mod', title: 'Destinos e Sistema', items: [{ id: 'fin_3', text: 'Atualizar Planilha de Movimentação para "Limpeza Técnica 2".' }] }];

                    return stepsData[this.step] || [];
                }
            }));
        });
    </script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased min-h-screen" x-data="appData">

    <div x-show="screen === 'home'" x-cloak class="min-h-screen flex flex-col items-center">
        <div class="w-full max-w-md bg-white min-h-screen shadow-2xl flex flex-col">
            <div class="bg-red-600 p-8 text-white text-center rounded-b-3xl shadow-lg relative">
                <button @click="openGallery()" class="absolute top-6 right-6 p-2 bg-white/20 hover:bg-white/30 rounded-full transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                </button>
                <h1 class="text-3xl font-extrabold tracking-tight">Setup LATAM</h1>
            </div>

            <div class="flex-1 p-6 flex flex-col justify-center space-y-8">
                <div>
                    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">1. Equipamento?</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <template x-for="m in ['A320', 'A320 NEO', 'A321', 'B777']" :key="m">
                            <button @click="model = m" :class="model === m ? 'bg-blue-900 text-white' : 'bg-gray-50 text-gray-600 border'" class="py-4 rounded-2xl font-bold text-sm" x-text="m"></button>
                        </template>
                    </div>
                </div>

                <div>
                    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">2. Ciclo?</h2>
                    <div class="grid grid-cols-4 gap-3">
                        <template x-for="c in [1, 2, 3, 4]" :key="c">
                            <button @click="cycle = c" :class="cycle === c ? 'bg-red-600 text-white' : 'bg-gray-50 text-gray-600 border'" class="py-4 rounded-2xl font-bold text-sm flex flex-col items-center">
                                <span x-text="c + 'º'"></span>
                                <span class="uppercase tracking-wider" style="font-size: 8px;" x-text="c === 4 ? 'OVH' : 'REP'"></span>
                            </button>
                        </template>
                    </div>
                </div>

                <button @click="startApp()" :disabled="!model || !cycle" :class="(model && cycle) ? 'bg-green-500 text-white shadow-lg' : 'bg-gray-100 text-gray-300'" class="w-full py-4 rounded-2xl font-bold text-lg">Iniciar Bancada</button>
            </div>
        </div>
    </div>

    <div x-show="screen === 'gallery'" x-cloak class="min-h-screen flex flex-col w-full max-w-md mx-auto bg-gray-50 relative shadow-2xl">
        <div class="bg-blue-900 text-white p-4 pt-6 shadow-md sticky top-0 z-20">
            <div class="flex items-center gap-4 mb-4">
                <button @click="screen = 'home'" class="p-2 bg-blue-800 rounded-full"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
                <div>
                    <h1 class="font-black text-xl">Acervo de Ferramentas</h1>
                    <p class="text-blue-200 text-xs uppercase tracking-widest mt-1">Navegação Física</p>
                </div>
            </div>
            <input type="search" x-model="searchQuery" @input="if(searchQuery !== '') { activeTab = 'all'; selectedContainer = null; selectedSub = null; }" class="block w-full p-3 text-sm text-gray-900 border rounded-xl" placeholder="Pesquisar por nome ou P/N...">
        </div>

        <div x-show="searchQuery === ''" class="bg-white p-2 border-b flex gap-1 overflow-x-auto text-xs font-bold uppercase">
            <button @click="activeTab = 'all'; selectedContainer = null; selectedSub = null" :class="activeTab === 'all' ? 'bg-blue-900 text-white' : 'bg-gray-100 text-gray-600'" class="px-3 py-2 rounded-lg flex-shrink-0">Tudo</button>
            <button @click="activeTab = 'caixas'; selectedContainer = null; selectedSub = null" :class="activeTab === 'caixas' ? 'bg-blue-900 text-white' : 'bg-gray-100 text-gray-600'" class="px-3 py-2 rounded-lg flex-shrink-0">Caixas (1-9)</button>
            <button @click="activeTab = 'carros'; selectedContainer = null; selectedSub = null" :class="activeTab === 'carros' ? 'bg-blue-900 text-white' : 'bg-gray-100 text-gray-600'" class="px-3 py-2 rounded-lg flex-shrink-0">Carros</button>
            <button @click="activeTab = 'armarios'; selectedContainer = null; selectedSub = null" :class="activeTab === 'armarios' ? 'bg-blue-900 text-white' : 'bg-gray-100 text-gray-600'" class="px-3 py-2 rounded-lg flex-shrink-0">Armários</button>
        </div>

        <div x-show="searchQuery === '' && activeTab !== 'all'" class="p-4 space-y-2">
            <div x-show="!selectedContainer" class="grid grid-cols-2 gap-2">
                <template x-for="container in uniqueContainers" :key="container">
                    <button @click="selectedContainer = container" class="bg-white border border-gray-200 p-4 rounded-xl text-left font-bold text-blue-900 hover:bg-blue-50 transition flex flex-col justify-between h-20 shadow-sm">
                        <span x-text="container"></span>
                    </button>
                </template>
            </div>

            <div x-show="selectedContainer && !selectedSub" class="space-y-2">
                <button @click="selectedContainer = null" class="text-xs font-bold text-red-600 flex items-center gap-1 mb-2">&larr; Voltar para lista</button>
                <div class="bg-blue-50 p-2.5 rounded-xl font-bold text-blue-900 text-sm" x-text="selectedContainer"></div>
                <template x-for="sub in uniqueSubLocations" :key="sub">
                    <button @click="selectedSub = sub" class="w-full bg-white border border-gray-200 p-3.5 rounded-xl text-left font-semibold text-gray-700 flex justify-between items-center shadow-sm">
                        <span x-text="sub"></span>
                        <svg class="text-gray-400" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                    </button>
                </template>
            </div>

            <button x-show="selectedSub" @click="selectedSub = null" class="text-xs font-bold text-red-600 flex items-center gap-1 mb-2">&larr; Voltar para Gavetas</button>
        </div>

        <div class="flex-1 p-4 pb-8 overflow-y-auto space-y-3">
            <div x-show="searchQuery === '' && selectedSub" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-xs font-bold uppercase mb-2">
                Local: <span x-text="selectedContainer"></span> &gt; <span x-text="selectedSub"></span>
            </div>

            <template x-for="tool in filteredTools" :key="tool.code">
                <div class="bg-white border rounded-2xl shadow-sm overflow-hidden flex flex-col border-l-4" :class="tool.special ? 'border-l-orange-500' : 'border-l-blue-900'">
                    <div class="p-4 flex justify-between items-center">
                        <div>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest" x-text="tool.name"></p>
                            <h3 class="text-lg font-black text-blue-900" x-text="tool.code"></h3>
                            <div class="bg-gray-50 border p-2 rounded-lg flex items-center gap-2 mt-2">
                                <span class="font-bold text-gray-800 text-xs" x-text="tool.loc + ' (' + tool.sub + ')'"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div x-show="screen === 'checklist'" x-cloak class="min-h-screen flex flex-col w-full max-w-md mx-auto bg-gray-50 relative shadow-2xl">
        <div class="bg-blue-900 text-white p-4 pt-6 shadow-md sticky top-0 z-20">
            <div class="flex items-center justify-between mb-6">
                <button @click="screen = 'home'" class="p-2 bg-blue-800 rounded-full"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg></button>
                <div class="text-center">
                    <h1 class="font-black text-xl" x-text="model"></h1>
                    <p class="text-blue-200 text-xs uppercase tracking-widest font-semibold mt-1">
                        <span x-text="cycle + 'º Ciclo '"></span><span x-text="cycle === 4 ? '(Overhaul)' : '(Reparo)'"></span>
                    </p>
                </div>
                <div class="w-9"></div>
            </div>

            <div class="flex justify-between relative px-4">
                <div class="absolute top-1/2 left-8 right-8 h-1 bg-blue-800 transform -translate-y-1/2 rounded-full"></div>
                <template x-for="(name, index) in stepNames" :key="index">
                    <div class="flex flex-col items-center bg-blue-900 px-2 relative z-10">
                        <div :class="step === index ? 'border-white bg-red-600 text-white shadow-lg' : (step > index ? 'border-green-400 bg-green-400 text-blue-900' : 'border-blue-800 bg-blue-900 text-blue-400')" class="w-10 h-10 rounded-full flex items-center justify-center border-4 transition-colors duration-300">
                             <svg x-show="step > index" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                             <div x-show="step <= index" x-html="getStepIcon(index)"></div>
                        </div>
                    </div>
                </template>
            </div>
            <div class="text-center mt-3 text-sm font-bold text-white uppercase tracking-widest bg-blue-900 bg-opacity-50 py-1.5 mx-auto max-w-xs rounded-full" x-text="stepNames[step]"></div>
        </div>

        <div class="flex-1 p-5 pb-32 overflow-y-auto">
            <div class="space-y-4">
                <template x-for="module in currentModules()" :key="module.id">
                    <button @click="openModule(module)" class="w-full flex justify-between items-center bg-white border border-gray-200 shadow-sm p-5 rounded-2xl text-blue-900 font-extrabold text-base uppercase tracking-wider group">
                        <div class="flex items-center gap-4 text-left">
                            <div :class="isModuleComplete(module) ? 'bg-green-500 text-white' : 'bg-gray-50 text-gray-300 border-gray-300'" class="w-8 h-8 rounded-full border-2 flex items-center justify-center">
                                <svg x-show="isModuleComplete(module)" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 12 2 2 4-4"/></svg>
                            </div>
                            <span x-text="module.title" :class="isModuleComplete(module) ? 'text-green-700' : ''"></span>
                        </div>
                        <svg class="text-gray-400" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                    </button>
                </template>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 pb-6 shadow-2xl z-20">
            <div class="max-w-md mx-auto flex justify-between gap-4">
                <button @click="step = Math.max(0, step - 1)" :disabled="step === 0" class="flex-1 py-4 px-4 rounded-2xl font-bold text-sm bg-gray-100 text-gray-600 disabled:opacity-50">Voltar</button>
                <button x-show="step < stepNames.length - 1" @click="step = Math.min(stepNames.length - 1, step + 1)" class="flex-none w-2/3 py-4 px-4 rounded-2xl font-bold text-sm bg-blue-900 text-white">Avançar Etapa</button>
                <button x-show="step === stepNames.length - 1" @click="finishApp()" class="flex-none w-2/3 py-4 px-4 rounded-2xl font-bold text-sm bg-green-500 text-white">Finalizar OS</button>
            </div>
        </div>
    </div>

    <div x-show="screen === 'module'" x-cloak class="min-h-screen flex flex-col w-full max-w-md mx-auto bg-gray-50 relative shadow-2xl">
        <div class="bg-white p-4 pt-6 shadow-sm sticky top-0 z-20 border-b border-gray-200">
            <div class="flex items-center gap-4">
                <button @click="closeModule()" class="p-2 bg-gray-100 text-gray-600 rounded-full"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
                <div>
                    <p class="text-xs font-bold text-blue-600 uppercase tracking-widest" x-text="stepNames[step]"></p>
                    <h2 class="text-lg font-black text-gray-800 leading-tight" x-text="activeModule?.title || ''"></h2>
                </div>
            </div>
        </div>

        <div class="flex-1 p-4 pb-32 overflow-y-auto space-y-4">
            <template x-for="item in (activeModule?.items || [])" :key="item.id">
                <div :class="checked[item.id] ? 'bg-green-50 border-green-500 transform scale-95 opacity-75' : (item.highlight === 'alert' ? 'bg-orange-50 border-orange-300' : (item.highlight === 'info' ? 'bg-blue-50 border-blue-300' : 'bg-white border-gray-200'))" class="p-4 rounded-xl border-2 flex gap-4 items-start transition-all duration-200 shadow-sm">
                    <div @click="toggleCheck(item.id)" :class="checked[item.id] ? 'bg-green-500 border-green-500' : 'border-gray-300 bg-gray-50'" class="mt-0.5 flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center border-2 cursor-pointer">
                        <svg x-show="checked[item.id]" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="m20 6-11 11-5-5"/></svg>
                    </div>
                    <div class="flex-1 pt-0.5 flex flex-col gap-2">
                        <p :class="checked[item.id] ? 'text-gray-500 line-through' : 'text-gray-800 font-semibold'" class="text-sm leading-snug" x-text="item.text"></p>
                        <div class="flex flex-wrap gap-2 mt-1">
                            <template x-if="item.reference">
                                <button @click="openModalImage(item.reference)" class="px-3 py-1 bg-blue-50 text-blue-700 hover:bg-blue-100 border border-blue-200 rounded-lg text-xs font-bold uppercase">
                                    <span x-text="item.reference.btnText || 'Ver Referência'"></span>
                                </button>
                            </template>
                            <template x-if="item.reference">
                                <button @click="openLocationModalByCode(item.reference.toolCode)" class="w-8 h-8 flex justify-center items-center bg-orange-100 text-orange-600 rounded-lg border border-orange-200">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 pb-6 shadow-2xl z-20">
            <button @click="closeModule()" class="w-full py-4 rounded-2xl font-bold text-sm bg-blue-900 text-white" x-text="isModuleComplete(activeModule) ? 'Módulo Concluído - Voltar' : 'Voltar para Lista'"></button>
        </div>
    </div>

    <div x-show="modalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" style="background-color: rgba(15, 23, 42, 0.8);" @click.self="closeModalImage()">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl border flex flex-col" style="max-height: 85vh;">
            <div class="bg-gray-900 text-white p-4 flex justify-between items-center">
                <span class="font-extrabold text-xs uppercase tracking-widest text-gray-300">Apoio Visual / Tool</span>
                <button @click="closeModalImage()" class="p-1 text-gray-400 hover:text-white rounded-full bg-gray-800"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 bg-gray-100 flex flex-col items-center justify-center" style="min-height: 250px;">
                <img :src="modalData.imgUrl" class="max-w-full object-contain rounded-xl shadow-md border bg-white" style="max-height: 40vh;">
            </div>
            <div class="bg-white p-4 border-t space-y-2">
                <div class="flex flex-col gap-2 text-xs">
                    <div class="bg-gray-50 p-3 rounded-xl border w-full">
                        <p class="text-gray-400 font-bold uppercase tracking-wider mb-1" style="font-size: 9px;">Manual Ref.</p>
                        <p class="text-gray-800 font-bold break-words" x-text="modalData.manualPage"></p>
                    </div>
                    <div class="bg-blue-50 p-3 rounded-xl border border-blue-200 w-full">
                        <p class="text-blue-500 font-bold uppercase tracking-wider mb-1" style="font-size: 9px;">CMM Tool / Part</p>
                        <p class="text-blue-900 font-black break-words" x-text="modalData.toolCode"></p>
                    </div>
                </div>
                <button @click="closeModalImage()" class="w-full py-3 mt-3 bg-blue-900 text-white font-bold text-sm rounded-xl">Fechar Referência</button>
            </div>
        </div>
    </div>

</body>
</html>
